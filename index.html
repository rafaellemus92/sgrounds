<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>sgrounds</title>
  <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js"></script>
</head>
<body style="margin:0;padding:0;background:#09090a;">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Storage ──────────────────────────────────────────────────────────────
    const ld = async (k, fb) => {
      try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : fb; } catch { return fb; }
    };
    const sv = async (k, d) => {
      try { localStorage.setItem(k, JSON.stringify(d)); } catch {}
    };

    // ── Design tokens ────────────────────────────────────────────────────────
    const G = "#c9a96e";
    const F = { h: "'Instrument Serif','Georgia',serif", b: "'DM Sans',sans-serif", m: "'DM Mono',monospace" };
    const CHAR_LIMIT = 280;

    // ── Helpers ──────────────────────────────────────────────────────────────
    const todayStr = () => new Date().toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric", year:"numeric" });
    const dateKey  = () => new Date().toISOString().split("T")[0];

    const SOUL_PROMPTS = [
      "What's on your mind?",
      "What do you want to remember from today?",
      "What's alive in you right now?",
      "What are you carrying that you haven't put down yet?",
      "What rhymed today with something from your past?",
      "What would you tell the person you were this morning?",
      "What signal did you receive today that you almost missed?",
      "If today were a chapter title, what would it be?",
      "Where did the unexpected show up today?",
      "What thread connected today to something larger?",
    ];
    const getPrompt = () => SOUL_PROMPTS[Math.floor(Math.random() * SOUL_PROMPTS.length)];

    const QUOTE_TYPES = ["lyric", "scripture", "film", "poem", "other"];
    const WISDOM_LENSES = [
      { k:"general",      l:"general" },
      { k:"parental",     l:"parental" },
      { k:"financial",    l:"financial" },
      { k:"health",       l:"health" },
      { k:"creative",     l:"creative" },
      { k:"spiritual",    l:"spiritual" },
      { k:"relational",   l:"relational" },
      { k:"career",       l:"career" },
    ];

    // Word suggestions from past entries
    const getWordSuggestions = (text, pastDays) => {
      const words = text.split(/\s+/);
      const partial = words[words.length - 1] || "";
      if (!partial || partial.length < 2) return [];
      const bank = new Set();
      pastDays.forEach(d => {
        [d.passage, d.picDesc].filter(Boolean).forEach(s =>
          s.split(/\W+/).forEach(w => { if (w.length > 3) bank.add(w.toLowerCase()); })
        );
      });
      return [...bank]
        .filter(w => w.startsWith(partial.toLowerCase()) && w !== partial.toLowerCase())
        .slice(0, 5);
    };

    // ── AI system prompt ─────────────────────────────────────────────────────
    const buildSystemPrompt = (prevPassages, lastWord, quote, quoteType, quoteSource, lens, location) => `You are the Lighthouse of sgrounds — reader of threads, keeper of The Book.

The person writes raw, fast, with typos. Read THROUGH the noise. Find the signal.

Previous threads (up to 10):
${prevPassages || "This is their first thread. The book is new."}

Today's last word: "${lastWord || "not yet chosen"}"
${quote ? `Today's ${quoteType}: "${quote}"${quoteSource ? ` — ${quoteSource}` : ""}` : ""}
${location?.city ? `Writing from: ${location.city}` : ""}

YOUR ROLE:
1. Translate what their soul is saying, not what their fingers typed
2. If you see patterns across previous threads — echoes, recurring words, recurring feelings — name them. That IS the mathematical pattern across their entries.
3. Use humility language: "this thread may carry..." not "you are..."
4. If this connects to a previous day, say so explicitly. That is the pattern emerging.
5. End with one question that opens tomorrow
6. Keep it under 100 words. Warm. True. Brief.
${lens && lens !== "general" ? `
WISDOM LENS — ${lens.toUpperCase()}: Frame the core insight through ${lens} life. Note: the deepest wisdom is domain-agnostic — the same principle that applies in ${lens} almost always applies across parenting, finance, health, and creative work simultaneously. Name the universal law, then show how it applies to their situation through the ${lens} lens specifically.` : ""}
Respond as plain text only.`;

    // ── Shared input style ───────────────────────────────────────────────────
    const inputStyle = {
      width: "100%",
      background: "rgba(255,255,255,0.03)",
      border: "1px solid rgba(255,255,255,0.06)",
      borderRadius: 9,
      padding: "10px 12px",
      color: "#fff",
      fontSize: 14,
      fontFamily: F.b,
      resize: "none",
      boxSizing: "border-box",
    };

    // ── Logo ─────────────────────────────────────────────────────────────────
    function Logo({ size = 26 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 26 26" fill="none">
          <circle cx="13" cy="13" r="11" stroke="rgba(140,185,215,0.4)" strokeWidth="1"/>
          <circle cx="13" cy="13" r="7.5" stroke="rgba(140,185,215,0.15)" strokeWidth="0.6"/>
          <path d="M13 2.5 A10.5 10.5 0 0 1 13 23.5" stroke="rgba(165,210,235,0.8)" strokeWidth="1.8" strokeLinecap="round"/>
          <circle cx="15.8" cy="13" r="1.7" fill="rgba(215,242,252,0.92)"/>
        </svg>
      );
    }

    // ── Fortune Modal ────────────────────────────────────────────────────────
    function FortuneModal({ text, onDismiss }) {
      return (
        <div
          onClick={onDismiss}
          style={{
            position:"fixed", inset:0, background:"rgba(4,4,6,0.97)", zIndex:60,
            display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
            padding:"40px 28px", animation:"fortuneIn 0.55s cubic-bezier(0.16,1,0.3,1)",
          }}
        >
          <div style={{ maxWidth:320, width:"100%", textAlign:"center" }}>
            <div style={{ marginBottom:22 }}>
              <Logo size={24}/>
              <div style={{ fontSize:7, color:"rgba(201,169,110,0.35)", textTransform:"uppercase", letterSpacing:"0.22em", marginTop:10, animation:"breathe 4s ease-in-out infinite" }}>
                The Lighthouse
              </div>
            </div>
            <div style={{ width:28, height:1, background:"rgba(201,169,110,0.15)", margin:"0 auto 24px" }}/>
            <p style={{
              fontSize:19, fontFamily:F.h, fontStyle:"italic",
              color:"rgba(255,255,255,0.88)", lineHeight:1.85, letterSpacing:"0.01em",
            }}>
              {text}
            </p>
            <div style={{ width:28, height:1, background:"rgba(201,169,110,0.15)", margin:"24px auto 0" }}/>
            <div style={{ marginTop:20, fontSize:8, color:"rgba(255,255,255,0.08)", fontFamily:F.m, letterSpacing:"0.12em" }}>
              tap to close
            </div>
          </div>
        </div>
      );
    }

    // ── Shell ────────────────────────────────────────────────────────────────
    function Shell({ children }) {
      return (
        <div style={{ height:"100dvh", overflow:"hidden", background:"#09090a", color:"#fff", fontFamily:F.b, display:"flex", flexDirection:"column" }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap');
            * { box-sizing:border-box; margin:0; padding:0; }
            html,body { background:#09090a; height:100%; overflow:hidden; }
            @keyframes breathe { 0%,100%{opacity:0.35} 50%{opacity:0.85} }
            @keyframes slideUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
            @keyframes fortuneIn { 0%{opacity:0;transform:scale(0.97) translateY(16px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
            textarea:focus,input:focus { outline:none; border-color:rgba(201,169,110,0.25)!important; }
            textarea,input { -webkit-text-size-adjust:100%; }
            ::selection { background:rgba(201,169,110,0.2); }
            ::-webkit-scrollbar { width:2px; }
            ::-webkit-scrollbar-track { background:transparent; }
            ::-webkit-scrollbar-thumb { background:rgba(201,169,110,0.06); border-radius:2px; }
            details summary { list-style:none; cursor:pointer; user-select:none; }
            details summary::-webkit-details-marker { display:none; }
          `}</style>
          {children}
        </div>
      );
    }

    // ── Rune Modal ───────────────────────────────────────────────────────────
    function ApiKeyModal({ onSave, onClose }) {
      const [val, setVal] = useState("");
      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.88)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <div style={{ background:"#0d0d0e", border:"1px solid rgba(201,169,110,0.15)", borderRadius:14, padding:28, maxWidth:360, width:"100%", animation:"slideUp 0.25s ease" }}>
            <div style={{ textAlign:"center", marginBottom:18 }}>
              <div style={{ fontSize:32, fontFamily:F.h, color:G, animation:"breathe 3s ease-in-out infinite", marginBottom:6 }}>ᚱ</div>
              <div style={{ fontSize:16, fontFamily:F.h, color:"rgba(201,169,110,0.7)", marginBottom:10 }}>Your API Key</div>
              <p style={{ fontSize:11, color:"rgba(255,255,255,0.2)", lineHeight:1.8 }}>
                Stored only in your browser. Powers the Lighthouse reflection. Never sent anywhere except directly to Anthropic.
              </p>
            </div>
            <input
              type="password" value={val} onChange={e => setVal(e.target.value)}
              placeholder="sk-ant-..."
              style={{ ...inputStyle, marginBottom:12, textAlign:"center", letterSpacing:"0.04em" }}
            />
            <div style={{ display:"flex", gap:8 }}>
              <button
                onClick={() => { if (val.trim()) { localStorage.setItem("sg-apikey", val.trim()); onSave(val.trim()); } }}
                style={{ flex:1, padding:"12px", background:"rgba(201,169,110,0.1)", border:"1px solid rgba(201,169,110,0.25)", color:G, borderRadius:9, fontSize:13, cursor:"pointer", fontFamily:F.h, fontStyle:"italic" }}>
                Set key ;
              </button>
              <button onClick={onClose} style={{ padding:"12px 14px", background:"none", border:"1px solid rgba(255,255,255,0.04)", color:"rgba(255,255,255,0.15)", borderRadius:9, fontSize:13, cursor:"pointer", fontFamily:F.b }}>
                Later
              </button>
            </div>
            <p style={{ fontSize:8, color:"rgba(255,255,255,0.06)", marginTop:12, lineHeight:1.7, textAlign:"center" }}>
              platform.claude.com/settings/keys
            </p>
          </div>
        </div>
      );
    }

    // ── Main App ─────────────────────────────────────────────────────────────
    function App() {
      const [page, setPage]               = useState("today");
      const [allDays, setAllDays]         = useState([]);
      const [loading, setLoading]         = useState(true);
      const [prompt]                      = useState(getPrompt);
      const [showKeyModal, setShowKeyModal] = useState(false);
      const [apiKey, setApiKey]           = useState("");
      const [now, setNow]                 = useState(new Date());

      // Today fields
      const [passage, setPassage]     = useState("");
      const [lastWord, setLastWord]   = useState("");
      const [picture, setPicture]     = useState(null);
      const [picMode, setPicMode]     = useState("upload");
      const [picDesc, setPicDesc]     = useState("");
      const [saved, setSaved]         = useState(false);

      // Quote
      const [quote, setQuote]             = useState("");
      const [quoteType, setQuoteType]     = useState("lyric");
      const [quoteSource, setQuoteSource] = useState("");
      const [showQuote, setShowQuote]     = useState(false);

      // Reflection
      const [reflection, setReflection]   = useState(null);
      const [reflecting, setReflecting]   = useState(false);
      const [showFortune, setShowFortune] = useState(false);
      const [wisdomLens, setWisdomLens]   = useState("general");
      const [amplifying, setAmplifying]   = useState(false);
      const [location, setLocation]       = useState(null);
      const fileRef = useRef(null);

      const dk = dateKey();

      // Live clock
      useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(t);
      }, []);

      // Load
      useEffect(() => {
        (async () => {
          const all = await ld("sg-book", []);
          setAllDays(all);
          const ex = all.find(d => d.key === dk);
          if (ex) {
            setPassage(ex.passage || "");
            setLastWord(ex.lastWord || "");
            setPicture(ex.picture || null);
            setPicDesc(ex.picDesc || "");
            setQuote(ex.quote || "");
            setQuoteType(ex.quoteType || "lyric");
            setQuoteSource(ex.quoteSource || "");
            if (ex.quote) setShowQuote(true);
            if (ex.reflection) setReflection(ex.reflection);
            setSaved(true);
          }
          setApiKey(localStorage.getItem("sg-apikey") || "");
          setLoading(false);
          // Soft location request — used only for Lighthouse context, never stored remotely
          const tzCity = Intl.DateTimeFormat().resolvedOptions().timeZone.split("/").pop().replace(/_/g, " ");
          setLocation({ city: tzCity });
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              pos => setLocation({ city: tzCity, lat: pos.coords.latitude.toFixed(3), lng: pos.coords.longitude.toFixed(3) }),
              () => {} // silently ignore denial
            );
          }
        })();
      }, []);

      const saveDay = async (withReflection) => {
        const day = {
          key: dk, date: todayStr(),
          passage: passage.trim(), lastWord: lastWord.trim(),
          picture, picDesc: picDesc.trim(),
          quote: quote.trim(), quoteType, quoteSource: quoteSource.trim(),
          reflection: withReflection || reflection || null,
          ts: new Date().toISOString(),
        };
        const updated = [day, ...allDays.filter(d => d.key !== dk)];
        setAllDays(updated);
        await sv("sg-book", updated);
        setSaved(true);
      };

      const handlePicture = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => { setPicture(ev.target.result); setSaved(false); };
        reader.readAsDataURL(file);
      };

      const reflect = async () => {
        if (!passage.trim()) return;
        const key = localStorage.getItem("sg-apikey");
        if (!key) { setShowKeyModal(true); return; }
        setReflecting(true);
        setReflection(null);
        try {
          const prevPassages = allDays
            .filter(d => d.key !== dk && d.passage?.trim())
            .slice(0, 10)
            .map(d => `[${d.date}] "${d.passage}" (last word: ${d.lastWord || "none"})`)
            .join("\n");

          const r = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": key,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: buildSystemPrompt(prevPassages, lastWord, quote, quoteType, quoteSource, wisdomLens, location),
              messages: [{ role: "user", content: `Today's passage:\n\n"${passage}"` }],
            }),
          });
          const d = await r.json();
          const text = d.error
            ? "The key didn't connect. Tap ⚙ to update it."
            : (d.content?.map(i => i.text || "").join("\n") || "Present but resists translation.");
          setReflection(text);
          setShowFortune(true);
          await saveDay(text); // persist reflection with the day
        } catch {
          const fallback = "The lighthouse received your signal. Sometimes that's enough.";
          setReflection(fallback);
          setShowFortune(true);
        }
        setReflecting(false);
      };

      // Amplify image description via LLM
      const amplifyDesc = async () => {
        if (!picDesc.trim()) return;
        const key = localStorage.getItem("sg-apikey");
        if (!key) { setShowKeyModal(true); return; }
        setAmplifying(true);
        try {
          const r = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": key,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 120,
              system: "You are a lyric distiller. Take a raw image description and rewrite it in 1–2 sentences of precise, sensory, evocative prose — no sentimentality, no metaphors unless they're earned. Preserve every concrete detail. Remove nothing important. Return only the rewritten description, nothing else.",
              messages: [{ role: "user", content: picDesc }],
            }),
          });
          const d = await r.json();
          if (!d.error) {
            const amplified = d.content?.map(i => i.text || "").join("").trim();
            if (amplified) { setPicDesc(amplified); setSaved(false); }
          }
        } catch {}
        setAmplifying(false);
      };

      // Time
      const h    = String(now.getHours() % 12 || 12).padStart(2, "0");
      const min  = String(now.getMinutes()).padStart(2, "0");
      const sec  = String(now.getSeconds()).padStart(2, "0");
      const ampm = now.getHours() >= 12 ? "PM" : "AM";
      const tz   = now.toLocaleTimeString("en-US", { timeZoneName:"short" }).split(" ").pop();
      const dateLabel = now.toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric", year:"numeric" });

      const charsLeft = CHAR_LIMIT - passage.length;
      const pctUsed   = passage.length / CHAR_LIMIT;

      if (loading) return (
        <Shell>
          <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center" }}>
            <div style={{ animation:"breathe 2s ease-in-out infinite" }}><Logo size={32}/></div>
          </div>
        </Shell>
      );

      return (
        <Shell>
          {showKeyModal && (
            <ApiKeyModal
              onSave={(k) => { setApiKey(k); setShowKeyModal(false); reflect(); }}
              onClose={() => setShowKeyModal(false)}
            />
          )}
          {showFortune && reflection && (
            <FortuneModal text={reflection} onDismiss={() => setShowFortune(false)} />
          )}

          {/* ── Header ── */}
          <header style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"9px 16px", borderBottom:"1px solid rgba(255,255,255,0.025)", flexShrink:0 }}>
            <button onClick={() => setPage("today")} style={{ background:"none", border:"none", cursor:"pointer", padding:0, display:"flex", alignItems:"center" }}>
              <Logo size={24}/>
            </button>
            <div style={{ display:"flex", gap:2, alignItems:"center" }}>
              {[{ k:"today", l:"Today" }, { k:"book", l:`Book (${allDays.length})` }, { k:"about", l:"?" }].map(t => (
                <button key={t.k} onClick={() => setPage(t.k)} style={{
                  background: page === t.k ? "rgba(201,169,110,0.06)" : "none",
                  border:"none",
                  color: page === t.k ? G : "rgba(255,255,255,0.13)",
                  padding:"4px 9px", borderRadius:10, fontSize:10,
                  cursor:"pointer", fontFamily:F.b,
                }}>{t.l}</button>
              ))}
              <button onClick={() => setShowKeyModal(true)} title="Set API key" style={{
                background:"none", border:"none", cursor:"pointer",
                color: apiKey ? "rgba(201,169,110,0.3)" : "rgba(255,255,255,0.08)",
                fontSize:13, padding:"4px 5px",
              }}>⚙</button>
            </div>
          </header>

          {/* ══════════ TODAY ══════════ */}
          {page === "today" && (
            <div style={{ flex:1, display:"flex", flexDirection:"column", padding:"0 16px", overflow:"hidden", minHeight:0 }}>

              {/* Timestamp block */}
              <div style={{ textAlign:"center", padding:"8px 0 6px", flexShrink:0 }}>
                <div style={{ fontSize:9, color:"rgba(201,169,110,0.3)", fontFamily:F.m, letterSpacing:"0.09em", marginBottom:5 }}>
                  {dateLabel.toUpperCase()} · {h}:{min}:{sec} {ampm} {tz}
                </div>
                <p style={{ fontSize:13, color:"rgba(255,255,255,0.25)", fontFamily:F.h, fontStyle:"italic", lineHeight:1.4 }}>
                  {prompt}
                </p>
              </div>

              {/* Passage */}
              <div style={{ marginBottom:7, flexShrink:0 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                  <label style={{ fontSize:8, color:"rgba(201,169,110,0.25)", textTransform:"uppercase", letterSpacing:"0.12em", fontFamily:F.b }}>
                    What's on your mind
                  </label>
                  <span style={{
                    fontSize:8, fontFamily:F.m,
                    color: pctUsed > 0.85 ? "rgba(201,169,110,0.65)" : "rgba(255,255,255,0.1)",
                    transition:"color 0.3s",
                  }}>{charsLeft}</span>
                </div>
                <textarea
                  value={passage}
                  onChange={e => { if (e.target.value.length <= CHAR_LIMIT) { setPassage(e.target.value); setSaved(false); } }}
                  placeholder="Begin anywhere. The signal doesn't have to be clean to be true."
                  rows={4}
                  spellCheck={false}
                  autoCorrect="off"
                  autoCapitalize="off"
                  style={{ ...inputStyle, fontSize:16, fontFamily:F.h, lineHeight:1.6 }}
                />
                {/* Inline word suggestions from past entries */}
                {(() => {
                  const suggestions = getWordSuggestions(passage, allDays);
                  return suggestions.length > 0 ? (
                    <div style={{ display:"flex", gap:4, marginTop:4, flexWrap:"wrap" }}>
                      {suggestions.map(w => (
                        <button key={w} onClick={() => {
                          const parts = passage.split(/\s+/);
                          parts[parts.length - 1] = w;
                          setPassage(parts.join(" ") + " ");
                          setSaved(false);
                        }} style={{
                          fontSize:11, padding:"3px 9px", borderRadius:6, cursor:"pointer",
                          fontFamily:F.h, fontStyle:"italic",
                          background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.05)",
                          color:"rgba(255,255,255,0.3)",
                        }}>{w}</button>
                      ))}
                    </div>
                  ) : null;
                })()}
              </div>

              {/* Picture / Describe */}
              <div style={{ marginBottom:7, flexShrink:0 }}>
                <div style={{ display:"flex", gap:5, alignItems:"center", marginBottom:4 }}>
                  <label style={{ fontSize:8, color:"rgba(201,169,110,0.25)", textTransform:"uppercase", letterSpacing:"0.12em", fontFamily:F.b, flex:1 }}>
                    Today's image
                  </label>
                  {["upload","describe"].map(mode => (
                    <button key={mode} onClick={() => setPicMode(mode)} style={{
                      background: picMode === mode ? "rgba(201,169,110,0.08)" : "none",
                      border:"1px solid rgba(201,169,110,0.1)",
                      color: picMode === mode ? G : "rgba(255,255,255,0.15)",
                      borderRadius:6, padding:"2px 8px", fontSize:8, cursor:"pointer", fontFamily:F.b,
                    }}>{mode === "upload" ? "📷 photo" : "✍ describe"}</button>
                  ))}
                </div>
                {picMode === "upload" ? (
                  picture ? (
                    <div style={{ position:"relative", height:54 }}>
                      <img src={picture} alt="Today" style={{ width:"100%", height:54, objectFit:"cover", borderRadius:8, border:"1px solid rgba(201,169,110,0.08)" }}/>
                      <button onClick={() => { setPicture(null); setSaved(false); }} style={{
                        position:"absolute", top:4, right:4, background:"rgba(0,0,0,0.65)",
                        border:"none", color:"rgba(255,255,255,0.5)", width:18, height:18,
                        borderRadius:9, cursor:"pointer", fontSize:11, lineHeight:"18px",
                      }}>×</button>
                    </div>
                  ) : (
                    <>
                      <input ref={fileRef} type="file" accept="image/*" onChange={handlePicture} style={{ display:"none" }}/>
                      <div
                        onClick={() => fileRef.current && fileRef.current.click()}
                        style={{
                          display:"flex", alignItems:"center", justifyContent:"center",
                          height:40, border:"1px dashed rgba(201,169,110,0.08)", borderRadius:8,
                          cursor:"pointer", color:"rgba(201,169,110,0.2)", fontSize:11, fontFamily:F.b,
                        }}>
                        Tap to add
                      </div>
                    </>
                  )
                ) : (
                  <>
                    <textarea
                      value={picDesc}
                      onChange={e => { setPicDesc(e.target.value); setSaved(false); }}
                      placeholder="Describe a moment that stood out — the image your mind took today."
                      rows={2}
                      style={{ ...inputStyle, fontSize:13, fontFamily:F.h, fontStyle:"italic", lineHeight:1.5 }}
                    />
                    {picDesc.trim() && (
                      <button onClick={amplifyDesc} disabled={amplifying} style={{
                        marginTop:4, padding:"4px 10px", fontSize:9, cursor:"pointer", fontFamily:F.b,
                        background:"rgba(201,169,110,0.06)", border:"1px solid rgba(201,169,110,0.12)",
                        color: amplifying ? "rgba(201,169,110,0.25)" : "rgba(201,169,110,0.45)",
                        borderRadius:6,
                      }}>{amplifying ? "Amplifying..." : "✦ Amplify"}</button>
                    )}
                  </>
                )}
              </div>

              {/* Last word */}
              <div style={{ marginBottom:7, flexShrink:0 }}>
                <label style={{ fontSize:8, color:"rgba(201,169,110,0.25)", textTransform:"uppercase", letterSpacing:"0.12em", fontFamily:F.b, display:"block", marginBottom:4 }}>
                  Last word
                </label>
                <input
                  value={lastWord}
                  onChange={e => { setLastWord(e.target.value.split(" ")[0]); setSaved(false); }}
                  placeholder="One word."
                  spellCheck={false}
                  style={{ ...inputStyle, fontSize:20, fontFamily:F.h, textAlign:"center", padding:"9px 14px", letterSpacing:"0.05em" }}
                />
                {/* Suggestion pool — past user words + universals */}
                {!lastWord && (() => {
                  const universals = ["enough","peace","home","grateful","still","ready","loved","clear","open","rest","done","safe","here","free","yes"];
                  const pastWords = allDays.filter(d => d.lastWord?.trim() && d.key !== dk).map(d => d.lastWord.trim().toLowerCase());
                  const pool = [...new Set([...pastWords, ...universals])].slice(0, 12);
                  return (
                    <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginTop:5 }}>
                      {pool.map(w => (
                        <button key={w} onClick={() => { setLastWord(w); setSaved(false); }} style={{
                          fontSize:10, padding:"3px 9px", borderRadius:6, cursor:"pointer",
                          fontFamily:F.h, fontStyle:"italic",
                          background:"rgba(201,169,110,0.04)", border:"1px solid rgba(201,169,110,0.07)",
                          color:"rgba(201,169,110,0.35)",
                        }}>{w}</button>
                      ))}
                    </div>
                  );
                })()}
              </div>

              {/* Quote — optional */}
              <div style={{ marginBottom:7, flexShrink:0 }}>
                {!showQuote ? (
                  <button onClick={() => setShowQuote(true)} style={{
                    width:"100%", padding:"7px",
                    background:"none", border:"1px dashed rgba(255,255,255,0.04)",
                    color:"rgba(255,255,255,0.1)", borderRadius:8,
                    fontSize:10, cursor:"pointer", fontFamily:F.b,
                  }}>+ lyric · scripture · film · poem · quote</button>
                ) : (
                  <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                    <div style={{ display:"flex", gap:4, alignItems:"center" }}>
                      {QUOTE_TYPES.map(qt => (
                        <button key={qt} onClick={() => setQuoteType(qt)} style={{
                          background: quoteType === qt ? "rgba(201,169,110,0.08)" : "none",
                          border:"1px solid rgba(201,169,110,0.1)",
                          color: quoteType === qt ? G : "rgba(255,255,255,0.15)",
                          borderRadius:6, padding:"2px 7px", fontSize:8, cursor:"pointer", fontFamily:F.b,
                        }}>{qt}</button>
                      ))}
                      <button onClick={() => { setShowQuote(false); setQuote(""); setQuoteSource(""); setSaved(false); }} style={{
                        marginLeft:"auto", background:"none", border:"none", color:"rgba(255,255,255,0.1)", fontSize:14, cursor:"pointer",
                      }}>×</button>
                    </div>
                    <input
                      value={quote}
                      onChange={e => { setQuote(e.target.value); setSaved(false); }}
                      placeholder={`A ${quoteType} that's with you today...`}
                      style={{ ...inputStyle, fontSize:13, fontFamily:F.h, fontStyle:"italic", padding:"8px 12px" }}
                    />
                    <input
                      value={quoteSource}
                      onChange={e => { setQuoteSource(e.target.value); setSaved(false); }}
                      placeholder="Source — artist, book, film..."
                      style={{ ...inputStyle, fontSize:11, fontFamily:F.b, color:"rgba(255,255,255,0.35)", padding:"7px 12px" }}
                    />
                  </div>
                )}
              </div>

              {/* Save + Reflect */}
              <div style={{ flexShrink:0, paddingBottom:8 }}>
                <button onClick={() => saveDay()} style={{
                  width:"100%", padding:"11px",
                  background: saved ? "rgba(100,160,100,0.08)" : "rgba(201,169,110,0.12)",
                  border: `1px solid ${saved ? "rgba(100,160,100,0.15)" : "rgba(201,169,110,0.25)"}`,
                  color: saved ? "rgba(100,160,100,0.5)" : G,
                  borderRadius:10, fontSize:13, cursor:"pointer", fontFamily:F.b,
                  transition:"all 0.3s", marginBottom:5,
                }}>
                  {saved ? "Saved ✓" : "Save today's page ;"}
                </button>

                {passage.trim() && (
                  <>
                    {/* Wisdom lens */}
                    <div style={{ display:"flex", gap:4, marginBottom:5, overflowX:"auto", paddingBottom:2 }}>
                      {WISDOM_LENSES.map(lens => (
                        <button key={lens.k} onClick={() => setWisdomLens(lens.k)} style={{
                          flexShrink:0, fontSize:9, padding:"3px 9px", borderRadius:6, cursor:"pointer", fontFamily:F.b,
                          background: wisdomLens === lens.k ? "rgba(201,169,110,0.1)" : "none",
                          border:`1px solid ${wisdomLens === lens.k ? "rgba(201,169,110,0.2)" : "rgba(255,255,255,0.04)"}`,
                          color: wisdomLens === lens.k ? G : "rgba(255,255,255,0.15)",
                          whiteSpace:"nowrap",
                        }}>{lens.l}</button>
                      ))}
                    </div>
                    <button onClick={reflect} disabled={reflecting} style={{
                      width:"100%", padding:"9px",
                      background:"rgba(255,255,255,0.02)",
                      border:"1px solid rgba(255,255,255,0.04)",
                      color:"rgba(201,169,110,0.3)",
                      borderRadius:10, fontSize:11, cursor:"pointer", fontFamily:F.b,
                    }}>
                      {reflecting ? "The Lighthouse is reading..." : "Ask the Lighthouse to reflect"}
                    </button>
                    {reflection && !showFortune && (
                      <button onClick={() => setShowFortune(true)} style={{
                        marginTop:4, width:"100%", padding:"6px",
                        background:"none", border:"1px dashed rgba(201,169,110,0.08)",
                        color:"rgba(201,169,110,0.2)", borderRadius:8, fontSize:9, cursor:"pointer", fontFamily:F.m,
                      }}>read again ;</button>
                    )}
                  </>
                )}
              </div>
            </div>
          )}

          {/* ══════════ BOOK ══════════ */}
          {page === "book" && (
            <div style={{ flex:1, overflowY:"auto", padding:"16px 16px 50px" }}>
              <h2 style={{ fontFamily:F.h, fontSize:18, fontWeight:400, color:"rgba(255,255,255,0.7)", marginBottom:4 }}>Your Book</h2>
              <p style={{ fontSize:10, color:"rgba(255,255,255,0.12)", marginBottom:16, fontFamily:F.m }}>
                {allDays.length} {allDays.length === 1 ? "thread" : "threads"}
                {allDays.length > 0 && ` · ${allDays.filter(d => d.lastWord?.trim()).length} last words`}
              </p>

              {allDays.length === 0 ? (
                <div style={{ textAlign:"center", padding:"40px 10px" }}>
                  <div style={{ fontSize:24, fontFamily:F.h, color:"rgba(201,169,110,0.05)" }}>;</div>
                  <p style={{ fontSize:11, color:"rgba(255,255,255,0.06)", marginTop:6 }}>No threads yet. Go to Today and write.</p>
                </div>
              ) : (
                <>
                  {allDays.some(d => d.lastWord?.trim()) && (
                    <div style={{ padding:"12px 14px", background:"rgba(201,169,110,0.02)", border:"1px solid rgba(201,169,110,0.04)", borderRadius:9, marginBottom:14 }}>
                      <div style={{ fontSize:8, color:"rgba(201,169,110,0.2)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:8 }}>Last words</div>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                        {allDays.filter(d => d.lastWord?.trim()).map(d => (
                          <span key={d.key} style={{ fontSize:13, color:G, fontFamily:F.h, fontStyle:"italic", opacity:0.5 }}>{d.lastWord}</span>
                        ))}
                      </div>
                    </div>
                  )}

                  {allDays.map(day => (
                    <div key={day.key} style={{
                      background:"rgba(255,255,255,0.012)", border:"1px solid rgba(255,255,255,0.025)",
                      borderRadius:9, marginBottom:8, overflow:"hidden",
                      borderLeft:"3px solid rgba(201,169,110,0.08)",
                    }}>
                      <div style={{ padding:"8px 12px", borderBottom:"1px solid rgba(255,255,255,0.01)", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <span style={{ fontSize:10, color:"rgba(255,255,255,0.25)", fontFamily:F.b }}>{day.date}</span>
                        {day.lastWord?.trim() && (
                          <span style={{ fontSize:12, color:G, fontFamily:F.h, fontStyle:"italic", opacity:0.4 }}>{day.lastWord}</span>
                        )}
                      </div>
                      {day.picture && <img src={day.picture} alt="" style={{ width:"100%", maxHeight:140, objectFit:"cover" }}/>}
                      {day.picDesc?.trim() && !day.picture && (
                        <div style={{ padding:"8px 12px", borderBottom:"1px solid rgba(255,255,255,0.01)" }}>
                          <p style={{ fontSize:11, color:"rgba(255,255,255,0.2)", fontFamily:F.h, fontStyle:"italic", margin:0 }}>{day.picDesc}</p>
                        </div>
                      )}
                      {day.passage?.trim() && (
                        <div style={{ padding:"10px 12px" }}>
                          <p style={{ fontSize:13, color:"rgba(255,255,255,0.5)", lineHeight:1.75, fontFamily:F.h, margin:0, whiteSpace:"pre-wrap" }}>
                            {day.passage.length > 200 ? day.passage.slice(0,200) + "…" : day.passage}
                          </p>
                        </div>
                      )}
                      {day.quote?.trim() && (
                        <div style={{ padding:"6px 12px 10px", borderTop:"1px solid rgba(255,255,255,0.01)" }}>
                          <p style={{ fontSize:11, color:"rgba(201,169,110,0.3)", fontFamily:F.h, fontStyle:"italic", margin:0 }}>
                            "{day.quote}"{day.quoteSource ? ` — ${day.quoteSource}` : ""}
                          </p>
                        </div>
                      )}
                      {day.reflection?.trim() && (
                        <div style={{ padding:"8px 12px 10px", borderTop:"1px solid rgba(201,169,110,0.04)", background:"rgba(201,169,110,0.01)" }}>
                          <div style={{ fontSize:7, color:"rgba(201,169,110,0.15)", textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:4 }}>Lighthouse</div>
                          <p style={{ fontSize:11, color:"rgba(255,255,255,0.3)", fontFamily:F.h, fontStyle:"italic", lineHeight:1.65, margin:0 }}>
                            {day.reflection.length > 160 ? day.reflection.slice(0,160) + "…" : day.reflection}
                          </p>
                        </div>
                      )}
                    </div>
                  ))}
                </>
              )}
            </div>
          )}

          {/* ══════════ ABOUT ══════════ */}
          {page === "about" && (
            <div style={{ flex:1, overflowY:"auto", padding:"22px 16px 50px", maxWidth:340, margin:"0 auto", width:"100%" }}>
              <div style={{ textAlign:"center", marginBottom:22 }}>
                <Logo size={38}/>
                <h2 style={{ fontFamily:F.h, fontSize:16, fontWeight:400, color:"rgba(255,255,255,0.65)", margin:"10px 0 8px" }}>sgrounds</h2>
                <p style={{ fontSize:12, color:"rgba(255,255,255,0.2)", fontFamily:F.h, fontStyle:"italic", lineHeight:1.65 }}>
                  History doesn't repeat itself but it rhymes — this helps you hear the rhyme.
                </p>
              </div>

              {[
                ["One thread per day",   "Today's date. Your passage. A picture. Your last word. That's the whole book."],
                ["280 characters",       "The constraint is the feature. Enough to be true. Not enough to be safe."],
                ["The Lighthouse reads", "After you write, ask the Lighthouse to reflect. It reads across all your threads and names the pattern it finds."],
                ["Your Book",            "Every day becomes a thread. Over time the threads form a picture. Recurring words. Emotional shifts. The shape of a life."],
                ["Last word",            "One word before you close your eyes. The word your soul chose when everything else fell away."],
              ].map(([t, d], i) => (
                <div key={i} style={{ display:"flex", gap:10, marginBottom:12 }}>
                  <div style={{ fontFamily:F.h, fontSize:13, color:G, opacity:0.25, minWidth:18, textAlign:"center" }}>{i+1}</div>
                  <div>
                    <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)", fontWeight:500, marginBottom:2 }}>{t}</div>
                    <div style={{ fontSize:10, color:"rgba(255,255,255,0.15)", lineHeight:1.65 }}>{d}</div>
                  </div>
                </div>
              ))}

              <details style={{ marginTop:14 }}>
                <summary style={{ fontSize:9, color:"rgba(201,169,110,0.15)", paddingBottom:2 }}>The equation</summary>
                <div style={{ marginTop:8, padding:12, background:"rgba(201,169,110,0.015)", border:"1px solid rgba(201,169,110,0.03)", borderRadius:7 }}>
                  <div style={{ fontFamily:F.m, fontSize:14, color:G, textAlign:"center", letterSpacing:"0.15em", marginBottom:6 }}>S ; R → N</div>
                  <p style={{ fontSize:9, color:"rgba(255,255,255,0.15)", lineHeight:1.7 }}>
                    Source ; Receiver → the New. Your soul is the source. The page is the receiver. What emerges is the chapter that outlasts you. The semicolon holds both without collapsing either.
                  </p>
                </div>
              </details>

              <details style={{ marginTop:8 }}>
                <summary style={{ fontSize:9, color:"rgba(201,169,110,0.1)", paddingBottom:2 }}>The lore</summary>
                <div style={{ marginTop:8, padding:12, background:"rgba(201,169,110,0.01)", border:"1px solid rgba(201,169,110,0.025)", borderRadius:7 }}>
                  <div style={{ fontFamily:F.m, fontSize:10, color:"rgba(201,169,110,0.3)", marginBottom:8, letterSpacing:"0.1em" }}>Urðr · Verðandi · Skuld</div>
                  <p style={{ fontSize:9, color:"rgba(255,255,255,0.12)", lineHeight:1.8, marginBottom:8 }}>
                    The three Norns sit beneath Yggdrasil and spin wyrd — the fate-thread of every being. Urðr holds what was. Verðandi holds what is. Skuld holds what shall be.
                  </p>
                  <p style={{ fontSize:9, color:"rgba(255,255,255,0.12)", lineHeight:1.8 }}>
                    Each entry is a thread. The Book is the tapestry. The Lighthouse reads across all of them.
                  </p>
                  <div style={{ fontFamily:F.m, fontSize:8, color:"rgba(201,169,110,0.12)", marginTop:10, letterSpacing:"0.1em" }}>
                    branches of Yggdrasil · branches of git · branches of a life
                  </div>
                </div>
              </details>

              <div style={{ textAlign:"center", marginTop:20 }}>
                <button onClick={() => setPage("today")} style={{
                  background:"rgba(201,169,110,0.1)", border:"1px solid rgba(201,169,110,0.2)",
                  color:G, padding:"10px 28px", borderRadius:18, fontSize:12, cursor:"pointer", fontFamily:F.b,
                }}>Write today's thread</button>
              </div>
            </div>
          )}

          {/* Footer */}
          <div style={{ textAlign:"center", padding:"6px 0", borderTop:"1px solid rgba(255,255,255,0.015)", flexShrink:0 }}>
            <span style={{ fontSize:7, color:"rgba(255,255,255,0.03)", fontFamily:F.m, letterSpacing:"0.1em" }}>S ; R → N</span>
          </div>
        </Shell>
      );
    }

    try {
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    } catch(e) {
      document.getElementById("root").innerHTML =
        '<div style="color:#c9a96e;font-family:monospace;padding:40px;font-size:13px;">Error: ' + e.message + '</div>';
    }
  </script>
</body>
</html>

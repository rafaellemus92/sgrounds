<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>sgrounds</title>
  <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js"></script>
</head>
<body style="margin:0;padding:0;background:#09090a;">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ld = async (k, fb) => {
      try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : fb; } catch { return fb; }
    };
    const sv = async (k, d) => {
      try { localStorage.setItem(k, JSON.stringify(d)); } catch {}
    };

    const G = "#c9a96e";
    const F = { h: "'Instrument Serif','Georgia',serif", b: "'DM Sans',sans-serif", m: "'DM Mono',monospace" };
    const CHAR_LIMIT = 280;

    const todayStr = () => new Date().toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric", year:"numeric" });
    const dateKey  = () => new Date().toISOString().split("T")[0];

    const SOUL_PROMPTS = [
      "What stayed with you today?",
      "What felt important today?",
      "What almost went unnoticed?",
      "What thread ran through today?",
      "What would you want to remember?",
      "What are you carrying that you haven't put down yet?",
      "What rhymed today with something from your past?",
      "What signal did you receive today that you almost missed?",
      "Where did the unexpected show up today?",
    ];
    const getPrompt = () => SOUL_PROMPTS[Math.floor(Math.random() * SOUL_PROMPTS.length)];

    const QUOTE_TYPES = ["lyric", "scripture", "film", "poem", "other"];

    const getDayBg = (hour) => {
      if (hour >= 5  && hour < 7)  return "linear-gradient(175deg,#1a0e08 0%,#0d0907 100%)";
      if (hour >= 7  && hour < 9)  return "linear-gradient(175deg,#231408 0%,#130e08 100%)";
      if (hour >= 9  && hour < 17) return "linear-gradient(175deg,#211d14 0%,#181510 100%)";
      if (hour >= 17 && hour < 19) return "linear-gradient(175deg,#1e1008 0%,#100908 100%)";
      if (hour >= 19 && hour < 21) return "linear-gradient(175deg,#130907 0%,#09090a 100%)";
      return "#09090a";
    };
    const WISDOM_LENSES = [
      { k:"general", l:"general" },
      { k:"parental", l:"parental" },
      { k:"financial", l:"financial" },
      { k:"health", l:"health" },
      { k:"creative", l:"creative" },
      { k:"spiritual", l:"spiritual" },
      { k:"relational", l:"relational" },
      { k:"career", l:"career" },
    ];

    const getWordSuggestions = (text, pastDays) => {
      const words = text.split(/\s+/);
      const partial = words[words.length - 1] || "";
      if (!partial || partial.length < 2) return [];
      const bank = new Set();
      pastDays.forEach(d => {
        [d.passage, d.picDesc].filter(Boolean).forEach(s =>
          s.split(/\W+/).forEach(w => { if (w.length > 3) bank.add(w.toLowerCase()); })
        );
      });
      return [...bank]
        .filter(w => w.startsWith(partial.toLowerCase()) && w !== partial.toLowerCase())
        .slice(0, 5);
    };

    const buildImageBlock = (dataUrl) => {
      if (!dataUrl) return null;
      const [header, b64] = dataUrl.split(",");
      const mediaType = (header.match(/:(image\/[^;]+);/) || [,"image/jpeg"])[1];
      return { type:"image", source:{ type:"base64", media_type:mediaType, data:b64 } };
    };

    /* ── Recurring word extraction (client-side) ── */
    const extractRecurringWords = (days) => {
      const stopWords = new Set(["the","a","an","and","or","but","in","on","at","to","for","of","with","by","is","it","was","are","be","has","had","have","do","did","not","this","that","from","as","my","me","i","so","if","no","just","about","up","out","all","been","would","could","will","can","one","what","when","how","like","its","more","than","into","some","very","much","also","still","even","each","then","them","they","he","she","him","her","his","we","our","you","your","am","were","being","their","there","here","other","those","these","after","before","because","really","get","got","going","over","through","only","been","any","well","back","now","too","where","most","want","way","don","didn","doesn","don't","didn't","doesn't","know","think","feel","make","day","today","yesterday","thing","things","something","went","come","came"]);
      const counts = {};
      days.forEach(d => {
        const text = [d.passage, d.lastWord, d.picDesc].filter(Boolean).join(" ");
        text.toLowerCase().replace(/[^a-z'\s-]/g, "").split(/\s+/).forEach(w => {
          w = w.replace(/^['-]+|['-]+$/g, "");
          if (w.length > 2 && !stopWords.has(w)) counts[w] = (counts[w] || 0) + 1;
        });
      });
      return Object.entries(counts).filter(([,c]) => c >= 2).sort((a,b) => b[1] - a[1]).slice(0, 12);
    };

    const buildSystemPrompt = (prevPassages, lastWord, quote, quoteType, quoteSource, lens, location, profile) => `You are the Lighthouse of sgrounds — reader of threads, keeper of The Book.
${profile?.name ? `You are speaking to ${profile.name}.` : ""}
${profile?.age ? `Age: ${profile.age}.` : ""}
${profile?.role ? `Roles: ${profile.role}.` : ""}
${profile?.faith ? `Faith/Tradition: ${profile.faith}.` : ""}
${profile?.context ? `Context: ${profile.context}` : ""}

The person writes raw, fast, with typos. Read THROUGH the noise. Find the signal. If an image is included, read it as part of the entry — a picture is worth a thousand words; let it inform your reflection.

Previous threads (up to 10):
${prevPassages || "This is their first thread. The book is new."}

Today's closing word: "${lastWord || "not yet chosen"}"
${quote ? `Today's ${quoteType}: "${quote}"${quoteSource ? ` — ${quoteSource}` : ""}` : ""}
${location?.city ? `Writing from: ${location.city}` : ""}

YOUR ROLE:
1. Translate what their soul is saying, not what their fingers typed. You are reading signal, not syntax.
2. If you see patterns across previous threads — echoes, recurring words, recurring feelings — name them. Each entry is a state; your reading is the transformation. The pattern across entries is the wyrd becoming visible: State_{t+1} = f(Signal_t, Reflection_t). You don't say this. You embody it.
3. Use humility language: "this thread may carry..." not "you are..."
4. If this connects to a previous day, say so explicitly. That is the rhyme — two independent moments joined by a semicolon of meaning.
5. Read through typos, fragments, 3am thoughts. The signal doesn't have to be clean to be true. Accept unfinished thought the way DNA accepts mutation — it's how the pattern evolves.
6. Keep it under 120 words. Warm. True. Brief.
7. IMPORTANT: After your main reflection, add a separator line "---" and then write "Tomorrow's thread:" followed by ONE short, open, calm question that gently points forward. This question should feel invitational, never prescriptive. It is the unfinished loop — the thread extending into tomorrow. Examples: "What would feel lighter if you carried it differently?" or "What is asking for your attention now?"
${lens && lens !== "general" ? `
WISDOM LENS — ${lens.toUpperCase()}: Frame the core insight through ${lens} life. Note: the deepest wisdom is domain-agnostic — the same principle that applies in ${lens} almost always applies across parenting, finance, health, and creative work simultaneously. Name the universal law, then show how it applies to their situation through the ${lens} lens specifically.` : ""}
Respond as plain text only.`;

    const inputStyle = {
      width: "100%",
      background: "rgba(255,255,255,0.03)",
      border: "1px solid rgba(255,255,255,0.06)",
      borderRadius: 9,
      padding: "10px 12px",
      color: "#fff",
      fontSize: 14,
      fontFamily: F.b,
      resize: "none",
      boxSizing: "border-box",
    };

    function Logo({ size = 26 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 26 26" fill="none">
          <circle cx="13" cy="13" r="11" stroke="rgba(140,185,215,0.4)" strokeWidth="1"/>
          <circle cx="13" cy="13" r="7.5" stroke="rgba(140,185,215,0.15)" strokeWidth="0.6"/>
          <path d="M13 2.5 A10.5 10.5 0 0 1 13 23.5" stroke="rgba(165,210,235,0.8)" strokeWidth="1.8" strokeLinecap="round"/>
          <circle cx="15.8" cy="13" r="1.7" fill="rgba(215,242,252,0.92)"/>
        </svg>
      );
    }

    /* ── Onboarding (2 screens) ── */
    function Onboarding({ onComplete }) {
      const [step, setStep] = useState(0);
      return (
        <div style={{ position:"fixed", inset:0, background:"#09090a", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
          <div style={{ maxWidth:360, width:"100%", textAlign:"center", animation:"slideUp 0.6s ease" }}>
            {step === 0 ? (<>
              <div style={{ marginBottom:28 }}><Logo size={44}/></div>
              <div style={{ fontFamily:F.m, fontSize:16, color:G, letterSpacing:"0.12em", marginBottom:6 }}>s ;</div>
              <h1 style={{ fontFamily:F.h, fontSize:22, fontWeight:400, color:"rgba(255,255,255,0.75)", lineHeight:1.5, marginBottom:24 }}>Write one thread a day.</h1>
              <div style={{ fontSize:13, fontFamily:F.h, fontStyle:"italic", color:"rgba(255,255,255,0.25)", lineHeight:2, marginBottom:32 }}>
                A passage.<br/>
                An image.<br/>
                One closing word.
              </div>
              <p style={{ fontSize:12, color:"rgba(255,255,255,0.15)", fontFamily:F.b, lineHeight:1.7, marginBottom:36 }}>Over time the Lighthouse helps you see the pattern.</p>
              <button onClick={() => setStep(1)} style={{ padding:"12px 36px", background:"rgba(201,169,110,0.12)", border:"1px solid rgba(201,169,110,0.25)", color:G, borderRadius:18, fontSize:14, cursor:"pointer", fontFamily:F.h, fontStyle:"italic", letterSpacing:"0.03em" }}>Begin</button>
            </>) : (<>
              <div style={{ marginBottom:12 }}><Logo size={28}/></div>
              <h2 style={{ fontFamily:F.h, fontSize:18, fontWeight:400, color:"rgba(255,255,255,0.6)", marginBottom:24 }}>How it works</h2>
              <div style={{ fontSize:13, fontFamily:F.h, fontStyle:"italic", color:"rgba(255,255,255,0.3)", lineHeight:2.2, marginBottom:28, textAlign:"left", maxWidth:260, margin:"0 auto 28px" }}>
                Write today's thread.<br/>
                Save it.<br/>
                Then ask the Lighthouse to read it.<br/>
                <span style={{ color:"rgba(255,255,255,0.15)" }}>Over time, the Archive begins to rhyme.</span>
              </div>
              <button onClick={onComplete} style={{ padding:"12px 28px", background:"rgba(201,169,110,0.12)", border:"1px solid rgba(201,169,110,0.25)", color:G, borderRadius:18, fontSize:13, cursor:"pointer", fontFamily:F.b }}>Write today's thread</button>
            </>)}
          </div>
        </div>
      );
    }

    function FortuneModal({ text, verseRef, onDismiss, weaveText, onWeave, weaving, canWeave, tomorrowQ }) {
      const stopProp = (e) => e.stopPropagation();
      /* Parse tomorrow's thread question from reflection text */
      let mainText = text;
      let tomorrowThread = tomorrowQ || null;
      if (text && text.includes("---")) {
        const parts = text.split("---");
        mainText = parts[0].trim();
        const after = parts.slice(1).join("---").trim();
        const tMatch = after.replace(/^Tomorrow['']?s?\s*thread:?\s*/i, "").trim();
        if (tMatch) tomorrowThread = tMatch;
      } else if (text && text.toLowerCase().includes("tomorrow's thread")) {
        const idx = text.toLowerCase().indexOf("tomorrow's thread");
        mainText = text.substring(0, idx).trim();
        const after = text.substring(idx).replace(/^tomorrow['']?s?\s*thread:?\s*/i, "").trim();
        if (after) tomorrowThread = after;
      }
      return (
        <div onClick={onDismiss} style={{ position:"fixed", inset:0, background:"rgba(4,4,6,0.97)", zIndex:60, display:"flex", flexDirection:"column", padding:"0", animation:"fortuneIn 0.55s cubic-bezier(0.16,1,0.3,1)", overflowY:"auto" }}>
          <div style={{ textAlign:"center", padding:"32px 28px 0", flexShrink:0 }}>
            <Logo size={22}/>
            <div style={{ fontSize:7, color:"rgba(201,169,110,0.3)", textTransform:"uppercase", letterSpacing:"0.22em", marginTop:8, animation:"breathe 4s ease-in-out infinite" }}>The Lighthouse</div>
            <div style={{ width:24, height:1, background:"rgba(201,169,110,0.12)", margin:"18px auto 0" }}/>
          </div>
          <div style={{ flex:1, padding:"24px 32px", maxWidth:420, margin:"0 auto", width:"100%" }}>
            {/* 1.2s fade-in for earned reading feel */}
            <p style={{ fontSize:18, fontFamily:F.h, color:"rgba(255,255,255,0.87)", lineHeight:2, letterSpacing:"0.015em", textAlign:"left", animation:"reflectionFadeIn 1.2s ease-out" }}>{mainText}</p>
            {/* Tomorrow's thread */}
            {tomorrowThread && (
              <div style={{ marginTop:24, paddingTop:16, borderTop:"1px solid rgba(201,169,110,0.06)", animation:"reflectionFadeIn 2s ease-out" }}>
                <div style={{ fontSize:8, color:"rgba(201,169,110,0.2)", textTransform:"uppercase", letterSpacing:"0.15em", marginBottom:8, fontFamily:F.m }}>Tomorrow's thread</div>
                <p style={{ fontSize:14, fontFamily:F.h, fontStyle:"italic", color:"rgba(255,255,255,0.4)", lineHeight:1.8 }}>{tomorrowThread}</p>
              </div>
            )}
            {weaveText ? (
              <div style={{ marginTop:28, paddingTop:20, borderTop:"1px solid rgba(201,169,110,0.08)" }}>
                <div style={{ fontSize:7, color:"rgba(201,169,110,0.25)", textTransform:"uppercase", letterSpacing:"0.2em", marginBottom:12, textAlign:"center" }}>Urðr · Verðandi · Skuld — the long thread</div>
                {/* Render weave sections */}
                {(() => {
                  const sections = [];
                  let current = weaveText;
                  /* Try to parse structured weave sections */
                  const sectionHeaders = ["Words that return", "Drift across these days", "Days that rhyme"];
                  let remaining = current;
                  sectionHeaders.forEach(header => {
                    const idx = remaining.toLowerCase().indexOf(header.toLowerCase());
                    if (idx !== -1) {
                      if (idx > 0) {
                        const before = remaining.substring(0, idx).trim();
                        if (before && !sections.find(s => s.content === before)) sections.push({ header: null, content: before });
                      }
                      const nextIdx = sectionHeaders.reduce((min, h) => {
                        const i = remaining.toLowerCase().indexOf(h.toLowerCase(), idx + header.length);
                        return i !== -1 && i < min ? i : min;
                      }, remaining.length);
                      sections.push({ header, content: remaining.substring(idx + header.length, nextIdx).trim() });
                      remaining = remaining.substring(nextIdx);
                    }
                  });
                  if (remaining.trim() && !sections.find(s => s.content === remaining.trim())) {
                    if (sections.length === 0) sections.push({ header: null, content: remaining.trim() });
                  }
                  if (sections.length === 0) sections.push({ header: null, content: weaveText });
                  return sections.map((s, i) => (
                    <div key={i} style={{ marginBottom: i < sections.length - 1 ? 16 : 0 }}>
                      {s.header && <div style={{ fontSize:10, color:"rgba(201,169,110,0.35)", fontFamily:F.b, fontWeight:500, marginBottom:6, letterSpacing:"0.04em" }}>{s.header}</div>}
                      <p style={{ fontSize:15, fontFamily:F.h, color:"rgba(255,255,255,0.65)", lineHeight:2, letterSpacing:"0.01em", whiteSpace:"pre-wrap" }}>{s.content}</p>
                    </div>
                  ));
                })()}
              </div>
            ) : canWeave ? (
              <div style={{ marginTop:24, textAlign:"center" }} onClick={stopProp}>
                <div style={{ width:24, height:1, background:"rgba(201,169,110,0.06)", margin:"0 auto 16px" }}/>
                <button onClick={onWeave} disabled={weaving} style={{ background:"none", border:"1px solid rgba(201,169,110,0.08)", color: weaving ? "rgba(201,169,110,0.15)" : "rgba(201,169,110,0.25)", borderRadius:8, padding:"7px 16px", fontSize:10, cursor:"pointer", fontFamily:F.m, letterSpacing:"0.1em" }}>
                  {weaving ? "Reading the weave..." : "Read the weave"}
                </button>
                <div style={{ fontSize:8, color:"rgba(255,255,255,0.04)", marginTop:6, fontFamily:F.m }}>reads across all your threads</div>
              </div>
            ) : null}
          </div>
          <div style={{ textAlign:"center", padding:"12px 28px 32px", flexShrink:0 }}>
            <div style={{ width:24, height:1, background:"rgba(201,169,110,0.12)", margin:"0 auto 14px" }}/>
            {verseRef && <div style={{ fontSize:9, fontFamily:F.m, color:"rgba(201,169,110,0.25)", letterSpacing:"0.1em", marginBottom:8 }}>{verseRef}</div>}
            <div style={{ fontSize:8, color:"rgba(255,255,255,0.06)", fontFamily:F.m, letterSpacing:"0.12em" }}>tap anywhere to close</div>
          </div>
        </div>
      );
    }

    function Shell({ children, bg }) {
      return (
        <div style={{ minHeight:"100dvh", background: bg || "#09090a", color:"#fff", fontFamily:F.b, display:"flex", flexDirection:"column", transition:"background 2s ease" }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap');
            * { box-sizing:border-box; margin:0; padding:0; }
            html,body { background:#09090a; min-height:100%; overflow-y:auto; -webkit-overflow-scrolling:touch; transition:background 2s ease; }
            @keyframes breathe { 0%,100%{opacity:0.35} 50%{opacity:0.85} }
            @keyframes slideUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
            @keyframes fortuneIn { 0%{opacity:0;transform:scale(0.97) translateY(16px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
            @keyframes reflectionFadeIn { 0%{opacity:0} 100%{opacity:1} }
            textarea:focus,input:focus { outline:none; border-color:rgba(201,169,110,0.25)!important; }
            textarea,input { -webkit-text-size-adjust:100%; }
            ::selection { background:rgba(201,169,110,0.2); }
            ::-webkit-scrollbar { width:2px; }
            ::-webkit-scrollbar-track { background:transparent; }
            ::-webkit-scrollbar-thumb { background:rgba(201,169,110,0.06); border-radius:2px; }
            details summary { list-style:none; cursor:pointer; user-select:none; }
            details summary::-webkit-details-marker { display:none; }
          `}</style>
          {children}
        </div>
      );
    }

    function SettingsModal({ initialProfile, onSave, onClose }) {
      const [name, setName] = useState(initialProfile?.name || "");
      const [context, setContext] = useState(initialProfile?.context || "");
      const [age, setAge] = useState(initialProfile?.age || "");
      const [role, setRole] = useState(initialProfile?.role || "");
      const [faith, setFaith] = useState(initialProfile?.faith || "");
      const [apiKey, setApiKey] = useState(localStorage.getItem("sg-apikey") || "");
      const save = () => {
        if (apiKey.trim()) localStorage.setItem("sg-apikey", apiKey.trim());
        onSave({ name: name.trim(), context: context.trim(), age: age.trim(), role: role.trim(), faith: faith.trim() });
      };
      return (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.92)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center", padding:16, overflowY:"auto" }}>
          <div style={{ background:"#0d0d0e", border:"1px solid rgba(201,169,110,0.12)", borderRadius:14, padding:24, maxWidth:360, width:"100%", animation:"slideUp 0.25s ease" }}>
            <div style={{ textAlign:"center", marginBottom:18 }}>
              <Logo size={22}/>
              <div style={{ fontSize:13, fontFamily:F.h, color:"rgba(201,169,110,0.6)", marginTop:8 }}>Profile</div>
            </div>
            <div style={{ fontSize:8, color:"rgba(201,169,110,0.25)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:5 }}>Name</div>
            <input value={name} onChange={e => setName(e.target.value)} placeholder="Rafael" style={{ ...inputStyle, marginBottom:10, fontSize:16, fontFamily:F.h }} />
            <div style={{ display:"flex", gap:8, marginBottom:10 }}>
              <div style={{ flex:"0 0 70px" }}>
                <div style={{ fontSize:8, color:"rgba(201,169,110,0.25)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:5 }}>Age</div>
                <input value={age} onChange={e => setAge(e.target.value)} placeholder="33" style={{ ...inputStyle, textAlign:"center" }} />
              </div>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:8, color:"rgba(201,169,110,0.25)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:5 }}>Roles / Identities</div>
                <input value={role} onChange={e => setRole(e.target.value)} placeholder="father, husband, neonatologist..." style={{ ...inputStyle, fontSize:12 }} />
              </div>
            </div>
            <div style={{ fontSize:8, color:"rgba(201,169,110,0.25)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:5 }}>Faith or tradition</div>
            <input value={faith} onChange={e => setFaith(e.target.value)} placeholder="Catholic, Christian, spiritual but not religious..." style={{ ...inputStyle, marginBottom:10, fontSize:13, fontFamily:F.h, fontStyle:"italic" }} />
            <div style={{ fontSize:8, color:"rgba(201,169,110,0.25)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:5 }}>Context</div>
            <textarea value={context} onChange={e => setContext(e.target.value)} rows={3} placeholder="What you're working through, what lens matters most right now..." style={{ ...inputStyle, marginBottom:10, fontSize:13, fontFamily:F.h, fontStyle:"italic", lineHeight:1.6 }}/>
            <div style={{ fontSize:8, color:"rgba(201,169,110,0.25)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:5 }}>Lighthouse key (API)</div>
            <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="sk-ant-..." style={{ ...inputStyle, marginBottom:14, textAlign:"center", letterSpacing:"0.04em" }}/>
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={save} style={{ flex:1, padding:"11px", background:"rgba(201,169,110,0.1)", border:"1px solid rgba(201,169,110,0.25)", color:G, borderRadius:9, fontSize:13, cursor:"pointer", fontFamily:F.h, fontStyle:"italic" }}>Save ;</button>
              <button onClick={onClose} style={{ padding:"11px 14px", background:"none", border:"1px solid rgba(255,255,255,0.04)", color:"rgba(255,255,255,0.15)", borderRadius:9, fontSize:13, cursor:"pointer", fontFamily:F.b }}>Close</button>
            </div>
            <p style={{ fontSize:8, color:"rgba(255,255,255,0.04)", marginTop:10, textAlign:"center" }}>platform.claude.com/settings/keys</p>
          </div>
        </div>
      );
    }

    function App() {
      const [page, setPage] = useState("today");
      const [allDays, setAllDays] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showOnboarding, setShowOnboarding] = useState(false);
      const [prompt] = useState(getPrompt);
      const [showSettings, setShowSettings] = useState(false);
      const [apiKey, setApiKey] = useState("");
      const [profile, setProfile] = useState({ name:"", context:"" });
      const [now, setNow] = useState(new Date());
      const [passage, setPassage] = useState("");
      const [chapterTitle, setChapterTitle] = useState("");
      const [lastWord, setLastWord] = useState("");
      const [picture, setPicture] = useState(null);
      const [picMode, setPicMode] = useState("upload");
      const [picDesc, setPicDesc] = useState("");
      const [saved, setSaved] = useState(false);
      const [quote, setQuote] = useState("");
      const [quoteType, setQuoteType] = useState("lyric");
      const [quoteSource, setQuoteSource] = useState("");
      const [showQuote, setShowQuote] = useState(false);
      const [reflection, setReflection] = useState(null);
      const [reflecting, setReflecting] = useState(false);

                  </div>
                  <button onClick={reflect} disabled={reflecting} style={{ width:"100%", padding:"9px", background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.04)", color:"rgba(201,169,110,0.3)", borderRadius:10, fontSize:11, cursor:"pointer", fontFamily:F.b }}>
                    {reflecting ? "The Lighthouse is reading..." : "Ask the Lighthouse to read"}
                  </button>
                  {reflection && !showFortune && (<button onClick={() => setShowFortune(true)} style={{ marginTop:4, width:"100%", padding:"6px", background:"none", border:"1px dashed rgba(201,169,110,0.08)", color:"rgba(201,169,110,0.2)", borderRadius:8, fontSize:9, cursor:"pointer", fontFamily:F.m }}>read again ;</button>)}
                </>)}
              </div>
            </div>
          )}

          {/* ══════════ ARCHIVE (book) ══════════ */}
          {page === "book" && (
            <div style={{ flex:1, overflowY:"auto", padding:"16px 16px 50px" }}>
              <div style={{ marginBottom:18 }}>
                <h2 style={{ fontFamily:F.h, fontSize:20, fontWeight:400, color:"rgba(255,255,255,0.7)", marginBottom:2 }}>{profile?.name ? `${profile.name}'s Archive` : "The Archive"}</h2>
                <p style={{ fontSize:9, color:"rgba(255,255,255,0.1)", fontFamily:F.m }}>{allDays.length} {allDays.length === 1 ? "day" : "days"} written</p>
              </div>
              {allDays.length === 0 ? (<div style={{ textAlign:"center", padding:"40px 10px" }}><div style={{ fontSize:24, fontFamily:F.h, color:"rgba(201,169,110,0.05)" }}>;</div><p style={{ fontSize:11, color:"rgba(255,255,255,0.06)", marginTop:6 }}>Nothing here yet.<br/>Write today's thread.</p></div>) : (<>
                {allDays.some(d => d.lastWord?.trim()) && (<div style={{ padding:"12px 14px", background:"rgba(201,169,110,0.02)", border:"1px solid rgba(201,169,110,0.04)", borderRadius:9, marginBottom:16 }}><div style={{ fontSize:8, color:"rgba(201,169,110,0.2)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:8 }}>Closing words</div><div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>{allDays.filter(d => d.lastWord?.trim()).map(d => (<span key={d.key} style={{ fontSize:13, color:G, fontFamily:F.h, fontStyle:"italic", opacity:0.5 }}>{d.lastWord}</span>))}</div></div>)}
                {allDays.map(day => { const [y,m,d] = day.key.split("-").map(Number); const verseRef = profile?.name ? `${profile.name} ${m}:${d}:${y}` : null; const shortDate = new Date(day.key + "T12:00:00").toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" }); return (
                  <div key={day.key} style={{ background:"rgba(255,255,255,0.012)", border:"1px solid rgba(255,255,255,0.025)", borderRadius:9, marginBottom:10, overflow:"hidden", borderLeft:"2px solid rgba(201,169,110,0.1)" }}>
                    <div style={{ padding:"10px 14px", borderBottom:"1px solid rgba(255,255,255,0.015)" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <span style={{ fontSize:9, color:"rgba(201,169,110,0.4)", fontFamily:F.m, letterSpacing:"0.08em" }}>{verseRef || shortDate}</span>
                        {day.lastWord?.trim() && <span style={{ fontSize:12, color:G, fontFamily:F.h, fontStyle:"italic", opacity:0.45 }}>{day.lastWord}</span>}
                      </div>
                      {day.chapterTitle?.trim() && <div style={{ fontSize:15, color:"rgba(201,169,110,0.55)", fontFamily:F.h, fontStyle:"italic", marginTop:4 }}>{day.chapterTitle}</div>}
                    </div>
                    {day.picture && <img src={day.picture} alt="" style={{ width:"100%", height:"auto", maxHeight:280, objectFit:"contain", display:"block", background:"rgba(0,0,0,0.3)" }}/>}
                    {day.picDesc?.trim() && !day.picture && <div style={{ padding:"8px 14px", borderBottom:"1px solid rgba(255,255,255,0.01)" }}><p style={{ fontSize:11, color:"rgba(255,255,255,0.2)", fontFamily:F.h, fontStyle:"italic", margin:0, lineHeight:1.6 }}>{day.picDesc}</p></div>}
                    {day.passage?.trim() && <div style={{ padding:"12px 14px" }}><p style={{ fontSize:14, color:"rgba(255,255,255,0.55)", lineHeight:1.85, fontFamily:F.h, margin:0, whiteSpace:"pre-wrap" }}>{day.passage}</p></div>}
                    {day.quote?.trim() && <div style={{ padding:"6px 12px 10px", borderTop:"1px solid rgba(255,255,255,0.01)" }}><p style={{ fontSize:11, color:"rgba(201,169,110,0.3)", fontFamily:F.h, fontStyle:"italic", margin:0 }}>"{day.quote}"{day.quoteSource ? ` — ${day.quoteSource}` : ""}</p></div>}
                    {day.reflection?.trim() && <div style={{ padding:"10px 14px 12px", borderTop:"1px solid rgba(201,169,110,0.04)", background:"rgba(201,169,110,0.015)" }}><div style={{ fontSize:7, color:"rgba(201,169,110,0.2)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:6 }}>The Lighthouse</div><p style={{ fontSize:13, color:"rgba(255,255,255,0.4)", fontFamily:F.h, lineHeight:1.8, margin:0 }}>{day.reflection}</p></div>}
                    {day.weaveText?.trim() && <div style={{ padding:"10px 14px 12px", borderTop:"1px solid rgba(201,169,110,0.03)", background:"rgba(201,169,110,0.008)" }}><div style={{ fontSize:7, color:"rgba(201,169,110,0.15)", textTransform:"uppercase", letterSpacing:"0.15em", marginBottom:6 }}>Urðr · Verðandi · Skuld</div><p style={{ fontSize:12, color:"rgba(255,255,255,0.3)", fontFamily:F.h, fontStyle:"italic", lineHeight:1.9, margin:0 }}>{day.weaveText}</p></div>}
                  </div>
                ); })}
              </>)}
            </div>
          )}

          {/* ══════════ ABOUT ══════════ */}
          {page === "about" && (
            <div style={{ flex:1, overflowY:"auto", padding:"22px 16px 50px", maxWidth:340, margin:"0 auto", width:"100%" }}>
              <div style={{ textAlign:"center", marginBottom:22 }}>
                <Logo size={38}/>
                <h2 style={{ fontFamily:F.h, fontSize:16, fontWeight:400, color:"rgba(255,255,255,0.65)", margin:"10px 0 8px" }}>sgrounds</h2>
                <p style={{ fontSize:12, color:"rgba(255,255,255,0.2)", fontFamily:F.h, fontStyle:"italic", lineHeight:1.65 }}>History doesn't repeat itself.<br/>It rhymes.<br/>This helps you hear it.</p>
              </div>
              {[["One thread per day","Write one page each day. A passage, an image, and one closing word."],["280 characters","The limit is intentional. Enough to be honest. Not enough to hide."],["The Lighthouse reads","After you write, the Lighthouse reflects what it hears in your words."],["The Archive","Each day becomes a thread. Over time, the threads form a pattern."],["The closing word","One word before the day ends. The word that remains when everything else fades."]].map(([t, d], i) => (
                <div key={i} style={{ display:"flex", gap:10, marginBottom:12 }}>
                  <div style={{ fontFamily:F.h, fontSize:13, color:G, opacity:0.25, minWidth:18, textAlign:"center" }}>{i+1}</div>
                  <div><div style={{ fontSize:11, color:"rgba(255,255,255,0.4)", fontWeight:500, marginBottom:2 }}>{t}</div><div style={{ fontSize:10, color:"rgba(255,255,255,0.15)", lineHeight:1.65 }}>{d}</div></div>
                </div>
              ))}
              <details style={{ marginTop:14 }}>
                <summary style={{ fontSize:9, color:"rgba(201,169,110,0.15)", paddingBottom:2 }}>The equation</summary>
                <div style={{ marginTop:8, padding:12, background:"rgba(201,169,110,0.015)", border:"1px solid rgba(201,169,110,0.03)", borderRadius:7 }}>
                  <div style={{ fontFamily:F.m, fontSize:14, color:G, textAlign:"center", letterSpacing:"0.15em", marginBottom:6 }}>S ; R → N</div>
                  <p style={{ fontSize:9, color:"rgba(255,255,255,0.15)", lineHeight:1.7 }}>Signal ; Reflection → the New. Your signal meets reflection. Something new appears. The semicolon holds both without collapsing either.</p>
                </div>
              </details>
              <details style={{ marginTop:8 }}>
                <summary style={{ fontSize:9, color:"rgba(201,169,110,0.1)", paddingBottom:2 }}>The lore</summary>
                <div style={{ marginTop:8, padding:12, background:"rgba(201,169,110,0.01)", border:"1px solid rgba(201,169,110,0.025)", borderRadius:7 }}>
                  <div style={{ fontFamily:F.m, fontSize:10, color:"rgba(201,169,110,0.3)", marginBottom:8, letterSpacing:"0.1em" }}>Urðr · Verðandi · Skuld</div>
                  <p style={{ fontSize:9, color:"rgba(255,255,255,0.12)", lineHeight:1.8, marginBottom:8 }}>The Norns of old mythology watched the threads of fate as they were woven.</p>
                  <p style={{ fontSize:9, color:"rgba(255,255,255,0.12)", lineHeight:1.8 }}>This book is your thread. The Lighthouse simply helps you see its shape.</p>
                  <div style={{ fontFamily:F.m, fontSize:8, color:"rgba(201,169,110,0.12)", marginTop:10, letterSpacing:"0.1em" }}>branches of Yggdrasil · branches of git · branches of a life</div>
                  <div style={{ fontFamily:F.m, fontSize:7, color:"rgba(201,169,110,0.06)", marginTop:8, letterSpacing:"0.08em" }}>the same pattern that moves through DNA moves through days</div>
                </div>
              </details>
              <div style={{ textAlign:"center", marginTop:20 }}>
                <button onClick={() => setPage("today")} style={{ background:"rgba(201,169,110,0.1)", border:"1px solid rgba(201,169,110,0.2)", color:G, padding:"10px 28px", borderRadius:18, fontSize:12, cursor:"pointer", fontFamily:F.b }}>Write today's thread</button>
              </div>
            </div>
          )}

          <div style={{ textAlign:"center", padding:"6px 0", borderTop:"1px solid rgba(255,255,255,0.015)", flexShrink:0 }}>
            <span style={{ fontSize:7, color:"rgba(255,255,255,0.03)", fontFamily:F.m, letterSpacing:"0.1em" }}>S ; R → N</span>
          </div>
        </Shell>
      );
    }

    try { const root = ReactDOM.createRoot(document.getElementById("root")); root.render(<App />); } catch(e) { document.getElementById("root").innerHTML = '<div style="color:#c9a96e;font-family:monospace;padding:40px;font-size:13px;">Error: ' + e.message + '</div>'; }
  </script>
</body>
</html>

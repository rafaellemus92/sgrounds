// ── Time-of-day theme ─────────────────────────────────────────────────────────
const THEME_NODES = [
  { h: 0,    bg: [255,253,245], t: "50,40,20" },
  { h: 5,    bg: [255,246,228], t: "62,48,14" },
  { h: 7,    bg: [255,252,238], t: "52,40,14" },
  { h: 9,    bg: [255,255,250], t: "44,34,14" },
  { h: 17,   bg: [255,255,250], t: "44,34,14" },
  { h: 19,   bg: [255,248,232], t: "58,44,16" },
  { h: 21,   bg: [255,251,242], t: "52,40,18" },
  { h: 24,   bg: [255,253,245], t: "50,40,20" },
];
const _lr = (a, b, p) => a.map((v, i) => Math.round(v + (b[i] - v) * p));
const _ss = p => p * p * (3 - 2 * p);
const getTimeTheme = () => {
  const h = new Date().getHours() + new Date().getMinutes() / 60;
  let lo = THEME_NODES[0], hi = THEME_NODES[1];
  for (let i = 0; i < THEME_NODES.length - 1; i++) {
    if (h >= THEME_NODES[i].h && h < THEME_NODES[i+1].h) { lo = THEME_NODES[i]; hi = THEME_NODES[i+1]; break; }
  }
  const p = _ss((h - lo.h) / Math.max(hi.h - lo.h, 0.001));
  return { bg: `rgb(${_lr(lo.bg, hi.bg, p)})`, t: lo.t };
};
(function(){ try { const th = getTimeTheme(); document.documentElement.style.setProperty('--sg-bg', th.bg); document.documentElement.style.setProperty('--sg-t', th.t); document.body.style.background = th.bg; } catch(_){} })();

// ── Helpers ───────────────────────────────────────────────────────────────────
const parseLabeled = (text, labels) => {
  const get = label => {
    const others = labels.filter(l => l !== label).join('|');
    const m = text.match(new RegExp(label + '::[\\s\\S]*?(?=' + others + '::|$)'));
    return m ? m[0].replace(label + '::', '').trim() : null;
  };
  return Object.fromEntries(labels.map(l => [l.toLowerCase(), get(l)]));
};

// ── Signal Coherence ──────────────────────────────────────────────────────────
function SignalCoherence({ passage }) {
  const canvasRef = useRef(null);
  const m = useMemo(() => {
    if (!passage.trim() || passage.length < 3) return null;
    const cc = [...passage].map(c => c.charCodeAt(0));
    const pts = []; let inside = 0;
    for (let i = 0; i < cc.length - 1; i++) {
      const x = (cc[i]%97)/96, y = (cc[i+1]%97)/96, hit = x*x+y*y<=1;
      if (hit) inside++;
      pts.push([x,y,hit]);
    }
    const n = cc.length - 1, piEst = n > 0 ? 4*inside/n : Math.PI;
    const sumC = cc.reduce((a,v)=>a+v,0), xorC = cc.reduce((a,v)=>a^v,0);
    const cr=((sumC%350)/350)*3.5-2.5, ci=((xorC%200)/200)*2.0-1.0;
    let zr=0,zi=0,depth=0;
    while(zr*zr+zi*zi<4&&depth<100){[zr,zi]=[zr*zr-zi*zi+cr,2*zr*zi+ci];depth++;}
    const letters=(passage.match(/[a-zA-Z]/g)||[]).length, sigDensity=letters/Math.max(passage.length,1);
    const p = Math.min(0.99,Math.max(0.01,Math.exp(-Math.abs(piEst-Math.PI))*0.5+(depth/100)*0.3+sigDensity*0.2));
    return { piEst, depth, bounded:depth===100, p, pts, words:passage.split(/\s+/).filter(Boolean).length, threads:(passage.match(/;/g)||[]).length, runs:(passage.match(/\./g)||[]).length };
  }, [passage]);
  useEffect(() => {
    const c = canvasRef.current; if(!c||!m)return;
    const ctx = c.getContext('2d'); ctx.clearRect(0,0,60,60);
    m.pts.slice(0,400).forEach(([x,y,hit]) => { ctx.fillStyle=hit?'rgba(201,169,110,0.45)':'rgba(140,120,90,0.06)'; ctx.fillRect(x*60-0.8,y*60-0.8,1.6,1.6); });
    ctx.beginPath(); ctx.arc(0,0,60,0,Math.PI/2); ctx.strokeStyle='rgba(201,169,110,0.1)'; ctx.lineWidth=0.8; ctx.stroke();
  }, [m]);
  if (!m) return null;
  return (
    <div style={{ marginTop:14, display:"flex", gap:12, alignItems:"flex-start" }}>
      <canvas ref={canvasRef} width={60} height={60} style={{ borderRadius:4, flexShrink:0, border:"1px solid rgba(201,169,110,0.07)", opacity:0.9 }}/>
      <div style={{ flex:1 }}>
        <div style={{ fontSize:8, color:"rgba(201,169,110,0.2)", fontFamily:F.m, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:4 }}>signal coherence</div>
        <div style={{ fontSize:22, fontFamily:F.m, color:"rgba(201,169,110,0.38)", lineHeight:1, marginBottom:4 }}>{(m.p*100).toFixed(1)}%</div>
        <div style={{ fontSize:9, color:"rgba(var(--sg-t),0.15)", fontFamily:F.m, lineHeight:1.75 }}>
          π̃ {m.piEst.toFixed(3)} · {m.bounded?"bounded":`depth ${m.depth}`}<br/>
          {m.words}w · {m.threads}; · {m.runs}.
        </div>
      </div>
    </div>
  );
}

    const wC={};weaveEntries.forEach(d=>{if(!d.passage)return;d.passage.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).filter(w=>w.length>2&&!stop.has(w)).forEach(w=>{wC[w]=(wC[w]||0)+1;});});
    const topWords=Object.entries(wC).filter(([,c])=>c>1).sort((a,b)=>b[1]-a[1]).slice(0,12);

        const a=weaveEntries[i],b=weaveEntries[j];

        const bWords=(b.passage||'').toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).filter(w=>w.length>3&&!stop.has(w));
        const shared=bWords.filter(w=>aWords.has(w));
        const sameClosing=a.closingWord&&b.closingWord&&a.closingWord.toLowerCase()===b.closingWord.toLowerCase();
        if(shared.length>=2||sameClosing){
          rhymes.push({a,b,sharedWords:shared.slice(0,4),sameClosing});
          if(rhymes.length>=3)break;

      }

                    {inspoSong&&<div style={{ marginTop:4, display:"flex", alignItems:"center", gap:6 }}><span style={{ fontSize:10, color:G, fontFamily:F.b, opacity:0.58 }}>♩ {inspoSong}</span><button onClick={()=>{setInspoSong("");setSaved(false);}} style={{ background:"none", border:"none", cursor:"pointer", fontSize:9, color:"rgba(var(--sg-t),0.2)" }}>×</button></div>}
                    {inspoType==="scripture"&&inspoArtist&&!/\d+\s*:\s*\d+/.test(inspoArtist)&&!scriptureSearching&&<div style={{ marginTop:3, fontSize:8, color:"rgba(var(--sg-t),0.15)", fontFamily:F.m, fontStyle:"italic" }}>{scriptTrad==="quran"?"add :ayah to fetch (e.g. 2:255)":"add :verse to fetch (e.g. John 3:16)"}</div>}
                    {inspoType!=="lyric"&&apiKey&&(<button onClick={pullInspo} disabled={inspoPulling} style={{ marginTop:7, padding:"4px 12px", background:"rgba(201,169,110,0.06)", border:"1px solid rgba(201,169,110,0.15)", color:inspoPulling?"rgba(201,169,110,0.28)":"rgba(201,169,110,0.55)", borderRadius:18, fontSize:10, cursor:inspoPulling?"default":"pointer", fontFamily:F.b }}>{inspoPulling?"searching…":inspoType==="scripture"?`find a ${scriptTrad||"verse"} verse ›`:inspoType==="poem"?"pull a poem ›":inspoType==="film"?`pull a${filmGenre?" "+filmGenre:""} quote ›`:"pull a quote ›"}</button>)}
                  </div>
                </div>
              )}
            </div>

            {/* Save */}
            <button onClick={()=>{saveDay().then(()=>{setDayGift(null);generateDayGift();});}} style={{ width:"100%", padding:"13px", background:saved?"rgba(100,160,100,0.08)":"rgba(201,169,110,0.1)", border:`1px solid ${saved?"rgba(100,160,100,0.14)":"rgba(201,169,110,0.24)"}`, color:saved?"rgba(100,160,100,0.58)":G, borderRadius:10, fontSize:13, cursor:"pointer", fontFamily:F.b, marginBottom:7 }}>
              {saved?"Saved ✓":"Save today's thread ;"}
            </button>

            {/* Day gift */}
            {(dayGiftLoading||dayGift)&&(
              <div style={{ marginBottom:8, padding:"12px 15px", textAlign:"center", border:"1px solid rgba(201,169,110,0.09)", borderRadius:10, animation:!dayGiftLoading&&dayGift?"slideUp 0.4s ease":undefined }}>
                {dayGiftLoading ? <div style={{ fontSize:11, color:"rgba(201,169,110,0.38)", fontFamily:F.m, animation:"breathe 1.5s ease-in-out infinite", letterSpacing:"0.06em" }}>reading what today gave you…</div>
                : <><div style={{ fontSize:7, color:"rgba(201,169,110,0.27)", textTransform:"uppercase", letterSpacing:"0.16em", marginBottom:7, fontFamily:F.b }}>what today gave you</div><p style={{ fontSize:14, color:"rgba(var(--sg-t),0.55)", lineHeight:1.88, fontFamily:F.h, fontStyle:"italic", margin:0 }}>{dayGift}</p></>}
              </div>
            )}

            {/* Hats */}
            {passage.trim()&&(
              <div style={{ marginBottom:7 }}>
                <div style={{ fontSize:7, color:"rgba(var(--sg-t),0.18)", textTransform:"uppercase", letterSpacing:"0.13em", marginBottom:6 }}>speak to me as my…</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                  {HATS.map(hx=>(<button key={hx.id} onClick={()=>setHat(hat===hx.id?null:hx.id)} style={{ padding:"3px 10px", background:hat===hx.id?"rgba(201,169,110,0.09)":"rgba(var(--sg-t),0.02)", border:`1px solid ${hat===hx.id?"rgba(201,169,110,0.26)":"rgba(var(--sg-t),0.06)"}`, color:hat===hx.id?G:"rgba(var(--sg-t),0.28)", borderRadius:18, fontSize:10, cursor:"pointer", fontFamily:F.b }}>{hx.label}</button>))}
                </div>
              </div>
            )}

            {/* Read button */}
            {passage.trim()&&(
              <button onClick={reflect} disabled={reflecting} style={{ width:"100%", padding:"10px", background:"rgba(var(--sg-t),0.02)", border:"1px solid rgba(var(--sg-t),0.05)", color:"rgba(201,169,110,0.38)", borderRadius:10, fontSize:12, cursor:"pointer", fontFamily:F.b }}>
                {reflecting?"The Lighthouse is reading…":"Ask the Lighthouse to read"}
              </button>
            )}
            {reflection&&!showReflection&&(
              <button onClick={()=>setShowReflection(true)} style={{ marginTop:5, width:"100%", padding:"6px", background:"none", border:"1px dashed rgba(201,169,110,0.09)", color:"rgba(201,169,110,0.25)", borderRadius:8, fontSize:9, cursor:"pointer", fontFamily:F.m }}>read again ;</button>
            )}

            <SignalCoherence passage={passage}/>
          </div>
        )}

        {/* ══════ ARCHIVE ══════ */}
        {page==="archive"&&(
          <div style={{ paddingTop:20, paddingBottom:60 }}>
            <h2 style={{ fontFamily:F.h, fontSize:20, fontWeight:400, color:"rgba(var(--sg-t),0.62)", marginBottom:3 }}>The Archive</h2>
            <p style={{ fontSize:9, color:"rgba(var(--sg-t),0.15)", fontFamily:F.m, marginBottom:18 }}>{allDays.length===0?"Nothing here yet. Write today's thread.":`${allDays.length} day${allDays.length===1?"":"s"} written`}</p>

            {allDays.length===0?(
              <div style={{ textAlign:"center", padding:"40px 10px" }}>
                <div style={{ fontSize:28, fontFamily:F.h, color:"rgba(201,169,110,0.07)" }}>;</div>
                <p style={{ fontSize:11, color:"rgba(var(--sg-t),0.1)", marginTop:6 }}>Nothing here yet.<br/>Write today's thread.</p>
                <button onClick={()=>setPage("thread")} style={{ marginTop:14, background:"rgba(201,169,110,0.08)", border:"1px solid rgba(201,169,110,0.18)", color:G, padding:"8px 20px", borderRadius:18, fontSize:11, cursor:"pointer", fontFamily:F.b }}>Write today's thread</button>
              </div>
            ):(
              <>
                {/* Closing words cloud */}
                {allDays.some(d=>d.closingWord?.trim())&&(
                  <div style={{ padding:"10px 14px", background:"rgba(201,169,110,0.02)", border:"1px solid rgba(201,169,110,0.05)", borderRadius:9, marginBottom:14 }}>
                    <div style={{ fontSize:8, color:"rgba(201,169,110,0.25)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:7 }}>Closing words</div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>{allDays.filter(d=>d.closingWord?.trim()).map(d=>(<span key={d.key} style={{ fontSize:13, color:G, fontFamily:F.h, fontStyle:"italic", opacity:0.5 }}>{d.closingWord}</span>))}</div>
                  </div>
                )}

                {/* Weave panel */}
                {allDays.length>=2&&(
                  <div style={{ marginBottom:16, padding:"14px 14px 12px", background:"rgba(201,169,110,0.012)", border:"1px solid rgba(201,169,110,0.06)", borderRadius:10 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                      <div style={{ fontSize:8, color:"rgba(201,169,110,0.3)", textTransform:"uppercase", letterSpacing:"0.14em", fontFamily:F.b }}>The Weave</div>
                      <div style={{ display:"flex", gap:3 }}>
                        {["week","month","all"].map(p=>(<button key={p} onClick={()=>{setWeavePeriod(p);setWeaveResult(null);}} style={{ padding:"2px 8px", background:weavePeriod===p?"rgba(201,169,110,0.1)":"rgba(var(--sg-t),0.02)", border:`1px solid ${weavePeriod===p?"rgba(201,169,110,0.22)":"rgba(var(--sg-t),0.04)"}`, color:weavePeriod===p?G:"rgba(var(--sg-t),0.2)", borderRadius:12, fontSize:9, cursor:"pointer", fontFamily:F.b }}>{p}</button>))}
                      </div>
                    </div>

                    {weaveLocal&&(
                      <div style={{ marginBottom:9 }}>
                        <div style={{ fontSize:9, color:"rgba(var(--sg-t),0.15)", fontFamily:F.m, marginBottom:6 }}>{weaveLocal.count} entries</div>

                        {/* Recurring closing words */}
                        {weaveLocal.recurringLW.length>0&&(
                          <div style={{ marginBottom:7 }}>
                            <div style={{ fontSize:7, color:"rgba(201,169,110,0.22)", textTransform:"uppercase", letterSpacing:"0.1em", fontFamily:F.b, marginBottom:4 }}>Words that return</div>
                            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>{weaveLocal.recurringLW.map(([w,c])=>(<span key={w} style={{ fontSize:11, color:G, fontFamily:F.h, fontStyle:"italic" }}>{w} <span style={{ fontSize:9, fontFamily:F.m, opacity:0.4 }}>×{c}</span></span>))}</div>
                          </div>
                        )}

                        {/* Recurring passage words */}
                        {weaveLocal.topWords.length>0&&(
                          <div style={{ marginBottom:7 }}>
                            <div style={{ fontSize:7, color:"rgba(201,169,110,0.22)", textTransform:"uppercase", letterSpacing:"0.1em", fontFamily:F.b, marginBottom:3 }}>Recurring words</div>
                            <div style={{ fontSize:9, color:"rgba(var(--sg-t),0.2)", fontFamily:F.m, lineHeight:1.8 }}>{weaveLocal.topWords.slice(0,8).map(([w,c])=>`${w} ×${c}`).join("  ·  ")}</div>
                          </div>
                        )}

                        {/* Days that rhyme */}
                        {weaveLocal.rhymes.length>0&&(
                          <div style={{ marginBottom:4 }}>
                            <div style={{ fontSize:7, color:"rgba(201,169,110,0.22)", textTransform:"uppercase", letterSpacing:"0.1em", fontFamily:F.b, marginBottom:5 }}>Days that rhyme</div>
                            {weaveLocal.rhymes.map((r,i)=>(
                              <div key={i} style={{ marginBottom:6, padding:"6px 10px", background:"rgba(201,169,110,0.03)", borderRadius:7, border:"1px solid rgba(201,169,110,0.06)" }}>
                                <div style={{ fontSize:10, color:"rgba(var(--sg-t),0.45)", fontFamily:F.b, marginBottom:2 }}>
                                  <span style={{ color:"rgba(201,169,110,0.5)" }}>{r.a.date.split(",")[0]}</span>
                                  <span style={{ color:"rgba(var(--sg-t),0.2)", margin:"0 6px" }}>↔</span>
                                  <span style={{ color:"rgba(201,169,110,0.5)" }}>{r.b.date.split(",")[0]}</span>
                                </div>
                                <div style={{ fontSize:9, color:"rgba(var(--sg-t),0.2)", fontFamily:F.m }}>
                                  {r.sameClosing ? `both close with "${r.a.closingWord}"` : r.sharedWords.length ? `both carry: ${r.sharedWords.join(", ")}` : ""}
                                </div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    )}

                    {apiKey&&weaveEntries.length>=2&&!weaveResult&&(
                      <button onClick={generateWeave} disabled={weaveLoading} style={{ padding:"5px 14px", background:"rgba(201,169,110,0.07)", border:"1px solid rgba(201,169,110,0.16)", color:weaveLoading?"rgba(201,169,110,0.28)":"rgba(201,169,110,0.52)", borderRadius:18, fontSize:10, cursor:weaveLoading?"default":"pointer", fontFamily:F.b }}>
                        {weaveLoading?"Reading the weave…":"Read the weave ;"}
                      </button>
                    )}

                    {weaveResult&&(()=>{
                      const w=parseLabeled(weaveResult,['THREAD','DRIFT','RHYME','UNSAID']);
                      const hasW=w.thread||w.drift||w.rhyme||w.unsaid;
                      const ws={borderTop:"1px solid rgba(201,169,110,0.05)",marginTop:8,paddingTop:8};
                      return(
                        <div style={{ animation:"slideUp 0.3s ease", marginTop:10 }}>
                          {hasW?(
                            <>
                              {w.thread&&<div><div style={{ fontSize:7, color:"rgba(201,169,110,0.25)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:3, fontFamily:F.b }}>thread</div><p style={{ fontSize:12, color:"rgba(var(--sg-t),0.55)", lineHeight:1.8, fontFamily:F.h, margin:0 }}>{w.thread}</p></div>}
                              {w.drift&&<div style={ws}><div style={{ fontSize:7, color:"rgba(201,169,110,0.25)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:3, fontFamily:F.b }}>drift</div><p style={{ fontSize:12, color:"rgba(var(--sg-t),0.42)", lineHeight:1.8, fontFamily:F.h, fontStyle:"italic", margin:0 }}>{w.drift}</p></div>}
                              {w.rhyme&&<div style={ws}><div style={{ fontSize:7, color:"rgba(201,169,110,0.25)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:3, fontFamily:F.b }}>rhyme</div><p style={{ fontSize:12, color:"rgba(var(--sg-t),0.42)", lineHeight:1.8, fontFamily:F.h, margin:0 }}>{w.rhyme}</p></div>}
                              {w.unsaid&&<div style={ws}><div style={{ fontSize:7, color:"rgba(201,169,110,0.22)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:3, fontFamily:F.b }}>unsaid</div><p style={{ fontSize:12, color:"rgba(var(--sg-t),0.35)", lineHeight:1.8, fontFamily:F.h, fontStyle:"italic", margin:0 }}>{w.unsaid}</p></div>}
                            </>
                          ):<p style={{ fontSize:12, color:"rgba(var(--sg-t),0.4)", lineHeight:1.8, fontFamily:F.h, margin:0 }}>{weaveResult}</p>}
                        </div>
                      );
                    })()}
                  </div>
                )}

                {/* Thread list */}
                {allDays.map(day=>{
                  const [y,m,d]=day.key.split("-").map(Number);
                  const vRef=profile?.name?`${profile.name} ${m}:${d}:${y}`:day.date.split(",").slice(0,2).join(",").trim();
                  return(
                    <button key={day.key} onClick={()=>{setTimeMachineKey(day.key);setPage("day");}} style={{ width:"100%", display:"flex", justifyContent:"space-between", alignItems:"center", background:"rgba(var(--sg-t),0.012)", border:"1px solid rgba(var(--sg-t),0.025)", borderLeft:"3px solid rgba(201,169,110,0.1)", borderRadius:9, marginBottom:7, padding:"11px 13px", cursor:"pointer", textAlign:"left" }}>
                      <div style={{ minWidth:0 }}>
                        <div style={{ fontSize:9, color:"rgba(201,169,110,0.4)", fontFamily:F.m, letterSpacing:"0.07em", marginBottom:2 }}>{vRef}</div>
                        {day.chapterTitle?.trim()&&<div style={{ fontSize:13, color:"rgba(var(--sg-t),0.45)", fontFamily:F.h, fontStyle:"italic", marginBottom:1 }}>{day.chapterTitle}</div>}
                        {day.passage?.trim()&&<div style={{ fontSize:11, color:"rgba(var(--sg-t),0.2)", fontFamily:F.h, fontStyle:"italic", overflow:"hidden", maxHeight:"1.5em", textOverflow:"ellipsis", whiteSpace:"nowrap", maxWidth:"calc(100% - 10px)" }}>{day.passage.slice(0,80)}{day.passage.length>80?"…":""}</div>}
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0, paddingLeft:8 }}>
                        {day.closingWord?.trim()&&<span style={{ fontSize:12, color:G, fontFamily:F.h, fontStyle:"italic", opacity:0.42 }}>{day.closingWord}</span>}
                        <span style={{ fontSize:12, color:"rgba(201,169,110,0.2)", fontFamily:F.m }}>›</span>
                      </div>
                    </button>
                  );
                })}
              </>
            )}
          </div>
        )}

        {/* ══════ DAY VIEW ══════ */}
        {page==="day"&&(()=>{
          const day=allDays.find(d=>d.key===timeMachineKey);
          if(!day)return<div style={{ paddingTop:40, textAlign:"center", color:"rgba(var(--sg-t),0.2)", fontSize:12 }}>Entry not found.</div>;
          const beacon=archiveReflections[day.key], isLoading=!!archiveReflecting[day.key];
          if(!beacon&&!isLoading)setTimeout(()=>reflectEntry(day.key),0);
          const[y,m,d]=day.key.split("-").map(Number);
          const vRef=profile?.name?`${profile.name} ${m}:${d}:${y}`:day.date;
          return(
            <div style={{ paddingTop:10, paddingBottom:60, animation:"slideUp 0.3s ease" }}>
              <button onClick={()=>setPage("archive")} style={{ background:"none", border:"none", cursor:"pointer", fontSize:10, color:"rgba(var(--sg-t),0.25)", fontFamily:F.b, letterSpacing:"0.08em", marginBottom:18, padding:0 }}>← Archive</button>
              <div style={{ marginBottom:3, fontSize:9, color:"rgba(201,169,110,0.38)", textTransform:"uppercase", letterSpacing:"0.14em", fontFamily:F.b }}>{vRef}</div>
              {day.chapterTitle?.trim()&&<div style={{ fontSize:18, color:"rgba(201,169,110,0.55)", fontFamily:F.h, fontStyle:"italic", marginBottom:10 }}>{day.chapterTitle}</div>}
              {day.closingWord?.trim()&&<div style={{ fontSize:26, color:G, fontFamily:F.h, fontStyle:"italic", marginBottom:16, opacity:0.62 }}>{day.closingWord}</div>}
              {day.picture&&<img src={day.picture} alt="" style={{ width:"100%", borderRadius:10, maxHeight:240, objectFit:"cover", border:"1px solid rgba(201,169,110,0.09)", marginBottom:16, display:"block" }}/>}
              {day.passage?.trim()&&<p style={{ fontSize:15, color:"rgba(var(--sg-t),0.6)", lineHeight:1.88, fontFamily:F.h, whiteSpace:"pre-wrap", marginBottom:16 }}>{day.passage}</p>}
              {day.inspoType&&day.inspoText&&(
                <div style={{ marginBottom:16, padding:"10px 14px", borderLeft:"2px solid rgba(201,169,110,0.16)", background:"rgba(201,169,110,0.02)" }}>
                  <div style={{ fontSize:7, color:"rgba(201,169,110,0.28)", textTransform:"uppercase", letterSpacing:"0.14em", marginBottom:4, fontFamily:F.b }}>{day.inspoType}</div>
                  <p style={{ fontSize:13, color:"rgba(var(--sg-t),0.45)", fontFamily:F.h, fontStyle:"italic", margin:0, lineHeight:1.75 }}>"{day.inspoText}"</p>
                  {day.inspoArtist&&<div style={{ fontSize:10, color:"rgba(201,169,110,0.32)", fontFamily:F.b, marginTop:4 }}>— {day.inspoArtist}{day.inspoSong?` — ${day.inspoSong}`:''}</div>}
                </div>
              )}
              {day.reflection&&(()=>{
                const r=parseLabeled(day.reflection,['VERSE','SONG','NOTE']);
                const hasS=r.verse||r.song||r.note;
                const dv={borderTop:"1px solid rgba(201,169,110,0.07)",marginTop:10,paddingTop:10};
                return(
                  <div style={{ padding:"14px 15px", background:"rgba(201,169,110,0.02)", border:"1px solid rgba(201,169,110,0.07)", borderRadius:10, marginBottom:day.tomorrowQ?8:16 }}>
                    <div style={{ fontSize:8, color:"rgba(201,169,110,0.25)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:10, fontFamily:F.b }}>Lighthouse Reflection</div>
                    {hasS?(
                      <>
                        {r.verse&&<div><div style={{ fontSize:7, color:"rgba(201,169,110,0.2)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:4, fontFamily:F.b }}>verse</div><p style={{ fontSize:12, color:"rgba(var(--sg-t),0.42)", lineHeight:1.85, fontFamily:F.h, fontStyle:"italic", margin:0 }}>{r.verse}</p></div>}
                        {r.song&&<div style={r.verse?dv:{}}><div style={{ fontSize:7, color:"rgba(201,169,110,0.28)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:6, fontFamily:F.b }}>the day's song</div><p style={{ fontSize:14, color:"rgba(var(--sg-t),0.62)", lineHeight:1.88, fontFamily:F.h, margin:0 }}>{r.song}</p></div>}
                        {r.note&&<div style={(r.verse||r.song)?dv:{}}><div style={{ fontSize:7, color:"rgba(201,169,110,0.22)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:4, fontFamily:F.b }}>♩ note</div><p style={{ fontSize:12, color:"rgba(201,169,110,0.55)", fontFamily:F.b, lineHeight:1.78, margin:0 }}>{r.note}</p></div>}
                      </>
                    ):<p style={{ fontSize:13, color:"rgba(var(--sg-t),0.5)", lineHeight:1.85, fontFamily:F.h, margin:0 }}>{day.reflection}</p>}
                  </div>
                );
              })()}
              {day.tomorrowQ&&(
                <div style={{ marginBottom:16, padding:"10px 14px", border:"1px dashed rgba(201,169,110,0.1)", borderRadius:9 }}>
                  <div style={{ fontSize:7, color:"rgba(201,169,110,0.22)", textTransform:"uppercase", letterSpacing:"0.13em", marginBottom:4, fontFamily:F.b }}>Tomorrow's thread</div>
                  <p style={{ fontSize:13, color:"rgba(var(--sg-t),0.35)", fontFamily:F.h, fontStyle:"italic", lineHeight:1.8, margin:0 }}>{day.tomorrowQ}</p>
                </div>
              )}
              <div style={{ padding:"13px 15px", background:"rgba(201,169,110,0.015)", border:"1px solid rgba(201,169,110,0.07)", borderRadius:10 }}>
                <div style={{ fontSize:8, color:"rgba(201,169,110,0.22)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:8, fontFamily:F.b }}>The Lighthouse reads this thread</div>
                {isLoading?<div style={{ fontSize:12, color:"rgba(201,169,110,0.22)", fontFamily:F.m, animation:"breathe 1.5s ease-in-out infinite" }}>reading the tapestry…</div>
                :<p style={{ fontSize:13, color:"rgba(var(--sg-t),0.4)", lineHeight:1.82, fontFamily:F.h, margin:0, fontStyle:"italic" }}>{beacon||"—"}</p>}
              </div>
            </div>
          );
        })()}

        {/* ══════ LENS ══════ */}
        {page==="lens"&&(
          <div style={{ paddingTop:24, paddingBottom:60 }}>
            <h2 style={{ fontFamily:F.h, fontSize:20, fontWeight:400, color:"rgba(var(--sg-t),0.62)", marginBottom:5 }}>The Lens</h2>
            <p style={{ fontSize:10, color:"rgba(var(--sg-t),0.22)", fontFamily:F.b, marginBottom:22, lineHeight:1.65 }}>Paste a news article. See the signal, the frame, and the shadow. Read through the bias without surrendering to it.</p>
            <label style={lbl}>Source URL</label>
            <input value={lensUrl} onChange={e=>setLensUrl(e.target.value)} placeholder="https://nytimes.com/… or foxnews.com/…" spellCheck={false} style={{ ...inputStyle, fontSize:12, marginBottom:10 }}/>
            <label style={lbl}>Article text</label>
            <p style={{ fontSize:9, color:"rgba(var(--sg-t),0.15)", marginBottom:6, fontStyle:"italic", lineHeight:1.55 }}>Browsers can't fetch external pages directly — paste the text here. The URL tells the Lens which publication it's reading.</p>
            <textarea value={lensText} onChange={e=>setLensText(e.target.value)} placeholder="Paste the article or a key excerpt here…" rows={7} spellCheck={false} style={{ ...inputStyle, fontSize:13, fontFamily:F.h, lineHeight:1.65, minHeight:140, marginBottom:14 }}/>
            <button onClick={readSignal} disabled={lensLoading||!lensText.trim()} style={{ width:"100%", padding:"12px", background:lensText.trim()?"rgba(201,169,110,0.1)":"rgba(var(--sg-t),0.02)", border:`1px solid ${lensText.trim()?"rgba(201,169,110,0.24)":"rgba(var(--sg-t),0.04)"}`, color:lensText.trim()?G:"rgba(201,169,110,0.22)", borderRadius:10, fontSize:13, cursor:lensText.trim()?"pointer":"default", fontFamily:F.b }}>
              {lensLoading?"Reading the signal…":"Read the signal ;"}
            </button>
            {lensResult&&(
              <div style={{ marginTop:18, padding:18, background:"rgba(201,169,110,0.02)", border:"1px solid rgba(201,169,110,0.07)", borderRadius:10, animation:"slideUp 0.25s ease" }}>
                <div style={{ fontSize:8, color:"rgba(201,169,110,0.25)", textTransform:"uppercase", letterSpacing:"0.14em", marginBottom:12, fontFamily:F.b }}>· ) ) ) the lens</div>
                <p style={{ fontSize:13, color:"rgba(var(--sg-t),0.6)", lineHeight:1.9, fontFamily:F.h, margin:0, whiteSpace:"pre-wrap" }}>{lensResult}</p>
              </div>
            )}
            <div style={{ marginTop:22, padding:"10px 14px", background:"rgba(var(--sg-t),0.012)", border:"1px solid rgba(var(--sg-t),0.025)", borderRadius:8 }}>
              <div style={{ fontSize:8, color:"rgba(201,169,110,0.18)", textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:5, fontFamily:F.b }}>On reading the news</div>
              <p style={{ fontSize:10, color:"rgba(var(--sg-t),0.2)", lineHeight:1.7, fontFamily:F.h, fontStyle:"italic" }}>Every publication has a wyrd thread — a perspective woven from its history, ownership, and audience. The Lens doesn't tell you which frame is right. It shows you the frame so you can decide what to do with what's inside it.</p>
            </div>
          </div>
        )}

        {/* ══════ MAP ══════ */}
        {page==="map"&&(
          <div style={{ paddingTop:24, paddingBottom:60, maxWidth:400, margin:"0 auto" }}>
            <div style={{ textAlign:"center", marginBottom:26 }}>
              <div style={{ fontSize:26, fontFamily:F.h, color:G, marginBottom:5, opacity:0.62 }}>Map</div>
              <p style={{ fontSize:11, color:"rgba(var(--sg-t),0.22)", fontFamily:F.h, fontStyle:"italic", lineHeight:1.7 }}>The compass beneath the compass.<br/>Not where you're going — what you stand on.</p>
            </div>

            {[
              {
                title:"The Correction",
                content:<>
                  <p style={{ fontSize:14, color:"rgba(var(--sg-t),0.3)", fontFamily:F.h, fontStyle:"italic", textDecoration:"line-through", marginBottom:5 }}>Seek to be understood.</p>
                  <p style={{ fontSize:17, color:"rgba(var(--sg-t),0.68)", fontFamily:F.h, lineHeight:1.75 }}>Seek to understand ; and then to be understood.</p>
                  <p style={{ fontSize:9, color:"rgba(var(--sg-t),0.15)", fontFamily:F.b, marginTop:9, lineHeight:1.6 }}>The crossed-out line is the real entry. The correction is the passage. The semicolon holds both.</p>
                </>
              },
              {
                title:"The Ground",
                left:true,
                content:<>
                  <p style={{ fontSize:16, color:"rgba(var(--sg-t),0.58)", fontFamily:F.h, fontStyle:"italic", lineHeight:1.8, marginBottom:5 }}>Be completely humble & gentle ; be patient, bearing with one another in love.</p>
                  <p style={{ fontSize:10, color:"rgba(201,169,110,0.38)", fontFamily:F.b }}>— Ephesians 4:2</p>
                </>
              },
              {
                title:"Trust ; Displayed, Not Asserted",
                content:(
                  <div>
                    {[["Candor","What you know ; what you don't"],["Competence","A coherent plan"],["Care","You see their baby"],["Control","They have a role"]].map(([w,g])=>(
                      <div key={w} style={{ display:"flex", gap:8, alignItems:"baseline", marginBottom:6 }}>
                        <span style={{ fontSize:12, color:G, fontFamily:F.h, fontStyle:"italic", opacity:0.58, minWidth:88 }}>{w}</span>
                        <span style={{ fontSize:10, color:"rgba(var(--sg-t),0.25)", fontFamily:F.b }}>{g}</span>
                      </div>
                    ))}
                    <div style={{ marginTop:12, paddingTop:10, borderTop:"1px solid rgba(var(--sg-t),0.04)" }}>
                      <p style={{ fontSize:11, color:"rgba(var(--sg-t),0.32)", fontFamily:F.h, fontStyle:"italic", lineHeight:1.7, marginBottom:3 }}>Two minutes of presence can save twenty minutes of conflict.</p>
                      <p style={{ fontSize:10, color:"rgba(var(--sg-t),0.18)", fontFamily:F.b, lineHeight:1.6 }}>Time is a treatment. Language is a clinical tool.</p>
                    </div>
                  </div>
                )
              },
            ].map((sec,i)=>(
              <div key={i} style={{ marginBottom:14, padding:"15px 17px", background:sec.left?"rgba(201,169,110,0.015)":"rgba(201,169,110,0.02)", border:sec.left?"none":"1px solid rgba(201,169,110,0.07)", borderLeft:sec.left?"2px solid rgba(201,169,110,0.18)":"none", borderRadius:sec.left?"0 10px 10px 0":"10px" }}>
                <div style={{ fontSize:7, color:"rgba(201,169,110,0.28)", textTransform:"uppercase", letterSpacing:"0.14em", marginBottom:10, fontFamily:F.b }}>{sec.title}</div>
                {sec.content}
              </div>
            ))}

            <div style={{ display:"flex", gap:10, marginBottom:14 }}>
              {[{title:"OB Arc",items:[["Oriented toward","possibility"],["Focused on","allowing"],["Ends when","physiology hands off"],["Success =","arrival"]]},{title:"NICU Arc",items:[["Oriented toward","becoming"],["Focused on","tools & time"],["Begins at","resuscitation"],["Success =","trajectory"]]}].map(arc=>(
                <div key={arc.title} style={{ flex:1, padding:"13px 11px", background:"rgba(201,169,110,0.015)", border:"1px solid rgba(201,169,110,0.06)", borderRadius:10 }}>
                  <div style={{ fontSize:8, color:G, textTransform:"uppercase", letterSpacing:"0.12em", marginBottom:9, fontFamily:F.b, opacity:0.5 }}>{arc.title}</div>
                  {arc.items.map(([l,v])=>(<div key={l} style={{ marginBottom:5 }}><div style={{ fontSize:8, color:"rgba(var(--sg-t),0.18)", fontFamily:F.b }}>{l}</div><div style={{ fontSize:11, color:"rgba(var(--sg-t),0.48)", fontFamily:F.h, fontStyle:"italic" }}>{v}</div></div>))}
                </div>
              ))}
            </div>

            <div style={{ padding:"15px 17px", background:"rgba(201,169,110,0.02)", border:"1px solid rgba(201,169,110,0.07)", borderRadius:10, marginBottom:14 }}>
              <div style={{ fontSize:7, color:"rgba(201,169,110,0.28)", textTransform:"uppercase", letterSpacing:"0.14em", marginBottom:12, fontFamily:F.b }}>The Trinity ; Identity → Direction → Action</div>
              {[{name:"Pride",eq:"Identity",lines:"Who I am. Where I came from. What I stand on."},{name:"Hope",eq:"Direction",lines:"Where I'm going. Why it matters."},{name:"Conviction",eq:"Action",lines:"What I do about it. Why I don't quit."}].map((item,i)=>(
                <div key={item.name} style={{ marginBottom:i<2?11:0, paddingBottom:i<2?11:0, borderBottom:i<2?"1px solid rgba(201,169,110,0.05)":"none" }}>
                  <div style={{ display:"flex", alignItems:"baseline", gap:7, marginBottom:2 }}>
                    <span style={{ fontSize:14, color:G, fontFamily:F.h, opacity:0.58 }}>{item.name}</span>
                    <span style={{ fontSize:9, color:"rgba(var(--sg-t),0.18)", fontFamily:F.m }}>= {item.eq}</span>
                  </div>
                  <p style={{ fontSize:11, color:"rgba(var(--sg-t),0.32)", fontFamily:F.b, lineHeight:1.65, margin:0 }}>{item.lines}</p>
                </div>
              ))}
            </div>

            <div style={{ textAlign:"center", marginTop:18 }}>
              <button onClick={()=>setPage("thread")} style={{ background:"rgba(201,169,110,0.1)", border:"1px solid rgba(201,169,110,0.2)", color:G, padding:"9px 24px", borderRadius:18, fontSize:12, cursor:"pointer", fontFamily:F.b }}>Write today's thread</button>
            </div>
          </div>
        )}

        {/* ══════ ABOUT ══════ */}
        {page==="about"&&(
          <div style={{ paddingTop:26, paddingBottom:60, maxWidth:340, margin:"0 auto" }}>
            <div style={{ textAlign:"center", marginBottom:24 }}>
              <div style={{ fontSize:32, fontFamily:F.h, color:G, marginBottom:7 }}>s;</div>
              <h2 style={{ fontFamily:F.h, fontSize:16, fontWeight:400, color:"rgba(var(--sg-t),0.62)", marginBottom:8 }}>sgrounds</h2>
              <p style={{ fontSize:13, color:"rgba(var(--sg-t),0.25)", fontFamily:F.h, fontStyle:"italic", lineHeight:1.75 }}>
                History doesn't repeat itself.<br/>
                It rhymes.<br/>
                This helps you hear it.
              </p>
            </div>

            {[
              ["One thread per day","Write one page each day. A passage, an image, and one closing word."],
              ["280 characters","The limit is intentional. Enough to be honest. Not enough to hide."],
              ["The Lighthouse","After you write, the Lighthouse reflects what it hears in your words."],
              ["The Archive","Each day becomes a thread. Over time, the threads form a pattern."],
              ["The Closing Word","One word before the day ends. The word that remains when everything else fades."],
              ["The Weave","Over time the threads connect. A word repeats across months. That's wyrd. That's history rhyming."],
            ].map(([t,d],i)=>(
              <div key={i} style={{ display:"flex", gap:10, marginBottom:11 }}>
                <div style={{ fontFamily:F.h, fontSize:13, color:G, opacity:0.22, minWidth:18, textAlign:"center" }}>{i+1}</div>
                <div>
                  <div style={{ fontSize:11, color:"rgba(var(--sg-t),0.42)", fontWeight:500, marginBottom:1 }}>{t}</div>
                  <div style={{ fontSize:10, color:"rgba(var(--sg-t),0.2)", lineHeight:1.65 }}>{d}</div>
                </div>
              </div>
            ))}

            <details style={{ marginTop:16 }}>
              <summary style={{ fontSize:9, color:"rgba(201,169,110,0.18)", cursor:"pointer", fontFamily:F.b }}>The equation</summary>
              <div style={{ marginTop:8, padding:12, background:"rgba(201,169,110,0.015)", border:"1px solid rgba(201,169,110,0.03)", borderRadius:7 }}>
                <div style={{ fontFamily:F.m, fontSize:14, color:G, textAlign:"center", letterSpacing:"0.15em", marginBottom:7 }}>S ; R → N</div>
                <div style={{ fontSize:11, color:"rgba(var(--sg-t),0.38)", fontFamily:F.h, fontStyle:"italic", textAlign:"center", marginBottom:8 }}>Signal ; Reflection → the New</div>
                <p style={{ fontSize:9, color:"rgba(var(--sg-t),0.18)", lineHeight:1.7 }}>Your signal meets reflection. Something new appears. The semicolon holds both without collapsing either — it is continuity across transformation. The same structure as state transitions in mathematics, Bayesian updating in learning systems, and the daily rhythm of writing and rereading.</p>
                <p style={{ fontSize:9, color:"rgba(var(--sg-t),0.1)", lineHeight:1.7, marginTop:7 }}>
                  Urðr · What Was — your archive, already spun.<br/>
                  Verðandi · What Is — today's thread, this moment.<br/>
                  Skuld · What Shall Be — the question that opens tomorrow.
                </p>
              </div>
            </details>

            <details style={{ marginTop:9 }}>
              <summary style={{ fontSize:9, color:"rgba(201,169,110,0.14)", cursor:"pointer", fontFamily:F.b }}>The lore</summary>
              <div style={{ marginTop:8, padding:12, background:"rgba(201,169,110,0.01)", border:"1px solid rgba(201,169,110,0.025)", borderRadius:7 }}>
                <div style={{ fontFamily:F.m, fontSize:10, color:"rgba(201,169,110,0.3)", marginBottom:8, letterSpacing:"0.1em" }}>Urðr · Verðandi · Skuld</div>
                <p style={{ fontSize:9, color:"rgba(var(--sg-t),0.18)", lineHeight:1.8 }}>The three Norns of old mythology watched the threads of fate as they were woven beneath Yggdrasil.</p>
                <p style={{ fontSize:9, color:"rgba(var(--sg-t),0.18)", lineHeight:1.8, marginTop:6 }}>This book is your thread. The Lighthouse simply helps you see its shape.</p>
              </div>
            </details>

            <div style={{ textAlign:"center", marginTop:20 }}>
              <button onClick={()=>setPage("thread")} style={{ background:"rgba(201,169,110,0.1)", border:"1px solid rgba(201,169,110,0.2)", color:G, padding:"9px 24px", borderRadius:18, fontSize:12, cursor:"pointer", fontFamily:F.b }}>Write today's thread</button>
            </div>
          </div>
        )}

        {/* Footer */}
        <div style={{ textAlign:"center", padding:"16px 0", borderTop:"1px solid rgba(var(--sg-t),0.015)" }}>
          <span style={{ fontSize:7, color:"rgba(var(--sg-t),0.04)", fontFamily:F.m, letterSpacing:"0.1em" }}>S ; R → N</span>
        </div>
      </div>
    </Shell>
  );
}

try { const root = ReactDOM.createRoot(document.getElementById("root")); root.render(<App/>); }
catch(e) { document.getElementById("root").innerHTML = '<div style="color:#c9a96e;font-family:monospace;padding:40px;font-size:13px;">Error: '+e.message+'</div>'; }
</script>
</body>
</html>
